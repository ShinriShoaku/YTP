<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Request Overlay</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange:   #f97316;
    --orange2:  #fb923c;
    --pink:     #ec4899;
    --purple:   #a855f7;
    --green:    #22c55e;
    --red:      #ef4444;
    --yellow:   #facc15;
    --bg-card:  rgba(10, 10, 20, 0.82);
    --bg-card2: rgba(15, 15, 30, 0.75);
    --border:   rgba(249, 115, 22, 0.3);
    --text:     #f1f5f9;
    --muted:    #94a3b8;
    --font:     'Segoe UI', system-ui, -apple-system, sans-serif;
    --radius:   14px;
    --shadow:   0 8px 32px rgba(0,0,0,0.6);
    --accent:   #f97316;
    --accent2:  #a855f7;
    --opacity:  0.82;
    --title-size: 20px;
  }

  html, body {
    width: 1920px; height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: var(--font);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ── Now Playing Bar ──────────────────────────────────── */
  #now-playing {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(10,10,20,var(--opacity));
    border-top: 2px solid var(--accent);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 24px;
    min-height: 88px;
    backdrop-filter: blur(12px);
    box-shadow: 0 -4px 24px rgba(0,0,0,0.5);
    position: fixed;
    bottom: 0; left: 0; right: 0;
    overflow: hidden;
    transition: opacity .3s;
  }
  #now-playing::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg,
      rgba(249,115,22,0.08) 0%, transparent 40%,
      transparent 60%, rgba(168,85,247,0.06) 100%);
    pointer-events: none;
  }
  #now-playing.hidden { display: none; }

  #np-disc {
    width: 60px; height: 60px; border-radius: 50%;
    background: radial-gradient(circle, #2d1b69, #1a1a2e);
    border: 2px solid var(--accent2);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    animation: spin-slow 4s linear infinite;
    box-shadow: 0 0 14px rgba(168,85,247,0.4);
  }
  #np-disc.paused { animation-play-state: paused; }
  #np-disc.hidden { display: none !important; }
  @keyframes spin-slow { to { transform: rotate(360deg); } }

  #np-thumb {
    width: 60px; height: 60px;
    border-radius: 8px; object-fit: cover;
    background: #1e1e2e; flex-shrink: 0;
    border: 2px solid var(--border);
    box-shadow: 0 0 12px rgba(249,115,22,0.3);
  }
  #np-thumb.hidden { display: none; }

  #np-info { flex: 1; min-width: 0; }

  #np-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 2px; color: var(--accent);
    font-weight: 700; margin-bottom: 3px;
  }
  #tiktok-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red); display: inline-block; margin-right: 4px;
    transition: background .3s;
  }
  #tiktok-dot.online {
    background: var(--green); box-shadow: 0 0 6px var(--green);
    animation: pulse-dot 2s infinite;
  }
  #tiktok-dot.off { display: none; }
  @keyframes pulse-dot { 0%,100%{ opacity:1 } 50%{ opacity:.5 } }

  #np-title {
    font-size: var(--title-size);
    font-weight: 800; line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-shadow: 0 2px 8px rgba(0,0,0,.6);
  }
  #np-title.idle { color: var(--muted); font-weight: 400; font-size: 15px; }

  #np-meta {
    font-size: 12px; color: var(--muted);
    margin-top: 3px; display: flex; align-items: center; gap: 8px;
  }
  #np-channel.hidden { display: none; }
  #np-requester {
    background: rgba(249,115,22,.15);
    border: 1px solid rgba(249,115,22,.3);
    border-radius: 20px; padding: 1px 8px;
    font-size: 11px; color: var(--orange2); font-weight: 600;
  }
  #np-requester.hidden { display: none; }

  /* Progress bar */
  #np-progress-wrap {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px; background: rgba(255,255,255,.08);
  }
  #np-progress-wrap.hidden { display: none; }
  #np-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--pink));
    width: 0%; transition: width 1s linear;
    box-shadow: 0 0 8px rgba(249,115,22,.8);
  }

  /* Right side of now-playing */
  #np-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
  #np-queue-badge {
    background: rgba(168,85,247,.18);
    border: 1px solid rgba(168,85,247,.4);
    border-radius: 20px; padding: 4px 12px;
    font-size: 12px; color: #c084fc; font-weight: 700;
  }
  #skip-vote-bar {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted); opacity: 0; transition: opacity .3s;
  }
  #skip-vote-bar.visible { opacity: 1; }
  #skip-vote-bar.hidden { display: none !important; }
  #skip-vote-dots { display: flex; gap: 3px; }
  .skip-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,.15); transition: background .2s;
  }
  .skip-dot.filled { background: var(--yellow); box-shadow: 0 0 4px var(--yellow); }

  /* ── Right/Left Panels ──────────────────────────────────── */
  #right-panel {
    position: fixed;
    top: 20px; right: 20px;
    width: 340px;
    display: flex; flex-direction: column; gap: 12px;
    max-height: 960px;
    transition: right .3s, left .3s;
  }
  #right-panel.pos-left { right: auto; left: 20px; }
  #right-panel.hidden { display: none; }

  #cmd-panel {
    position: fixed;
    top: 20px; left: 20px;
    width: 240px;
    transition: left .3s, right .3s;
  }
  #cmd-panel.pos-right { left: auto; right: 370px; }
  #cmd-panel.hidden { display: none; }

  .panel-card {
    background: rgba(10,10,20,var(--opacity));
    border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    backdrop-filter: blur(12px); box-shadow: var(--shadow);
  }
  .panel-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,.06);
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 1.5px; font-weight: 700; color: var(--accent);
  }

  /* ── Queue Panel ────────────────────────────────────────── */
  #queue-card.hidden { display: none; }
  #queue-list { padding: 8px 12px 10px; }
  .q-row {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .q-row:last-child { border-bottom: none; }
  .q-num { font-size: 11px; color: var(--accent); font-weight: 800; width: 18px; flex-shrink: 0; text-align: center; }
  .q-title { font-size: 12px; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .q-by { font-size: 10px; color: var(--muted); flex-shrink: 0; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .q-empty { font-size: 12px; color: var(--muted); text-align: center; padding: 12px 0; font-style: italic; }

  /* ── Request Feed Panel ─────────────────────────────────── */
  #req-card.hidden { display: none; }
  #req-feed { max-height: 340px; overflow: hidden; }
  #req-list { padding: 6px 12px 10px; display: flex; flex-direction: column; gap: 4px; }
  .req-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 7px 9px; border-radius: 9px;
    background: var(--bg-card2);
    border: 1px solid rgba(255,255,255,.05);
    animation: slideIn .3s ease;
  }
  @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
  .req-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .req-body { flex: 1; min-width: 0; }
  .req-user { font-size: 11px; font-weight: 700; color: var(--orange2); margin-bottom: 1px; }
  .req-text { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .req-status { font-size: 10px; flex-shrink: 0; margin-top: 2px; font-weight: 700; }
  .req-status.queued    { color: var(--green); }
  .req-status.searching { color: var(--yellow); }
  .req-status.not_found { color: var(--red); }
  .req-status.error     { color: var(--red); }
  .req-status.skip      { color: var(--yellow); }

  /* ── Commands Hint ──────────────────────────────────────── */
  #cmd-panel .panel-card {}
  #cmd-hint-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent); font-weight: 700; margin-bottom: 8px; }
  .cmd-row { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
  .cmd-tag {
    background: rgba(249,115,22,.15);
    border: 1px solid rgba(249,115,22,.3);
    border-radius: 6px; padding: 2px 8px;
    font-size: 11px; color: var(--orange2); font-weight: 700; font-family: monospace;
  }
  .cmd-desc { font-size: 11px; color: var(--muted); }

  /* ── Next Up Toast ──────────────────────────────────────── */
  #next-up {
    position: fixed; bottom: 104px; left: 24px;
    background: rgba(10,10,20,var(--opacity));
    border: 1px solid rgba(168,85,247,.5);
    border-radius: 10px; padding: 8px 14px;
    backdrop-filter: blur(10px); box-shadow: var(--shadow);
    display: none; animation: fadeUp .4s ease;
  }
  #next-up.visible { display: block; }
  #next-up.hidden  { display: none !important; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  #next-up-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--accent2); font-weight: 700; }
  #next-up-title { font-size: 13px; font-weight: 600; margin-top: 2px; max-width: 360px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Subtitle Panel ─────────────────────────────────────── */
  #subtitle-panel {
    position: fixed;
    bottom: 104px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 1300px;
    width: 88%;
    text-align: center;
    pointer-events: none;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  #subtitle-panel.hidden { display: none !important; }

  #subtitle-bg {
    position: relative;
    display: inline-block;
    background: rgba(8, 8, 18, 0.78);
    border: 1px solid rgba(249,115,22, 0.22);
    border-radius: 50px;
    padding: 12px 36px;
    backdrop-filter: blur(18px);
    box-shadow:
      0 8px 32px rgba(0,0,0,0.55),
      0 0 0 1px rgba(255,255,255,0.04) inset,
      0 0 60px rgba(249,115,22,0.07);
    max-width: 100%;
    overflow: hidden;
  }
  /* shimmer accent line on top of pill */
  #subtitle-bg::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%, rgba(249,115,22,0.6) 40%,
      rgba(168,85,247,0.5) 60%, transparent 100%);
    border-radius: 1px;
  }

  #subtitle-text {
    font-size: var(--sub-size, 28px);
    font-weight: 800;
    letter-spacing: 0.3px;
    color: var(--text);
    text-shadow: 0 2px 12px rgba(0,0,0,0.9);
    white-space: nowrap;
    line-height: 1.35;
    display: block;
  }

  /* Karaoke word spans */
  .sub-word {
    display: inline;
    transition: color .08s ease, text-shadow .08s ease;
    color: rgba(241,245,249,0.55);
  }
  .sub-word.done {
    color: rgba(241,245,249,0.4);
    text-shadow: none;
  }
  .sub-word.active {
    color: var(--accent);
    text-shadow:
      0 0 18px rgba(249,115,22,0.9),
      0 0 40px rgba(249,115,22,0.5),
      0 0 70px rgba(249,115,22,0.2);
    animation: word-pop .15s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes word-pop {
    from { transform: scale(0.92); }
    to   { transform: scale(1); }
  }

  /* Line transition animations */
  @keyframes sub-enter {
    from { opacity: 0; transform: translateY(18px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes sub-exit {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to   { opacity: 0; transform: translateY(-14px) scale(0.97); }
  }
  @keyframes sub-pulse-border {
    0%   { box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04) inset, 0 0 60px rgba(249,115,22,0.07); }
    50%  { box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04) inset, 0 0 80px rgba(249,115,22,0.18); }
    100% { box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04) inset, 0 0 60px rgba(249,115,22,0.07); }
  }
  #subtitle-bg.entering {
    animation: sub-enter .38s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  #subtitle-bg.leaving {
    animation: sub-exit .25s ease-in both;
  }
  #subtitle-bg.glow {
    animation: sub-pulse-border .6s ease;
  }

  /* Subtitle secondary label (song name hint) */
  #subtitle-song-hint {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-top: 2px;
    font-weight: 600;
    display: none;
  }
  #subtitle-song-hint.visible { display: block; }
</style>
</head>
<body>

<!-- Subtitle Panel -->
<div id="subtitle-panel" class="hidden">
  <div id="subtitle-bg">
    <span id="subtitle-text"></span>
  </div>
  <div id="subtitle-song-hint"></div>
</div>

<!-- Now Playing Bottom Bar -->
<div id="now-playing">
  <div id="np-disc">🎵</div>
  <img id="np-thumb" class="hidden" alt="">
  <div id="np-info">
    <div id="np-label">
      <span id="tiktok-dot"></span>▶ Now Playing
    </div>
    <div id="np-title" class="idle">Menunggu lagu…</div>
    <div id="np-meta">
      <span id="np-channel"></span>
      <span id="np-requester" class="hidden"></span>
    </div>
  </div>
  <div id="np-right">
    <div id="np-queue-badge">📋 0 in queue</div>
    <div id="skip-vote-bar">
      <span>⏭ Skip</span>
      <div id="skip-vote-dots"></div>
      <span id="skip-vote-count">0/5</span>
    </div>
  </div>
  <div id="np-progress-wrap"><div id="np-progress-bar"></div></div>
</div>

<!-- Right Panel: Queue + Requests -->
<div id="right-panel">
  <div class="panel-card" id="queue-card">
    <div class="panel-header">📋 Antrian</div>
    <div id="queue-list"><div class="q-empty">Antrian kosong</div></div>
  </div>
  <div class="panel-card" id="req-card">
    <div id="req-feed">
      <div class="panel-header">💬 Request TikTok</div>
      <div id="req-list"><div class="q-empty" style="padding:10px 0">Belum ada request</div></div>
    </div>
  </div>
</div>

<!-- Commands Hint Panel -->
<div id="cmd-panel">
  <div class="panel-card">
    <div class="panel-header">💡 Commands</div>
    <div style="padding:10px 14px 12px" id="cmd-rows"></div>
  </div>
</div>

<!-- Next Up Toast -->
<div id="next-up">
  <div id="next-up-label">🎵 Next Up</div>
  <div id="next-up-title"></div>
</div>

<script>
const API = 'http://localhost:8000';

/* ── State ─────────────────────────────────────────────── */
let state = {
  current_song: null, is_playing: false, is_paused: false,
  queue_count: 0, queue: [], tiktok_connected: false,
  recent_requests: [], skip_votes: 0, skip_threshold: 5, elapsed_ms: 0, commands: {},
};
let cfg = {};          // overlay display config
let songStartedAt = 0;
let songDurationMs = 0;
let progressTimer  = null;
let nextUpTimer    = null;
let subtitleHideTimer = null;
let karaokeTimers  = [];
let subtitleVisible = false;

/* ── Apply Display Config ──────────────────────────────── */
function applyConfig(c) {
  cfg = c;

  // CSS variables
  document.documentElement.style.setProperty('--accent',     c.accent_color  || '#f97316');
  document.documentElement.style.setProperty('--accent2',    c.accent_color2 || '#a855f7');
  document.documentElement.style.setProperty('--border',     hexAlpha(c.accent_color || '#f97316', 0.3));
  document.documentElement.style.setProperty('--title-size', (c.font_size_title || 20) + 'px');
  document.documentElement.style.setProperty('--opacity',    c.opacity_panels || 0.82);
  document.documentElement.style.setProperty('--sub-size',   (c.subtitle_font_size || 28) + 'px');

  // Visibility
  toggle('now-playing',    c.show_now_playing    !== false);
  toggle('queue-card',     c.show_queue          !== false);
  toggle('req-card',       c.show_request_feed   !== false);
  toggle('cmd-panel',      c.show_commands_hint  !== false);
  toggle('skip-vote-bar',  c.show_skip_vote      !== false, 'hidden');
  toggle('np-progress-wrap', c.show_progress_bar !== false);

  // Subtitle: if disabled, force-hide and clear
  if (c.show_subtitle === false) {
    clearSubtitle(true);
    document.getElementById('subtitle-panel').classList.add('hidden');
  }

  // TikTok dot
  const dot = document.getElementById('tiktok-dot');
  if (c.show_tiktok_dot === false) dot.classList.add('off');
  else dot.classList.remove('off');

  // Position: queue panel
  const rp = document.getElementById('right-panel');
  rp.classList.toggle('pos-left', c.position_queue === 'left');

  // Position: commands panel
  const cp = document.getElementById('cmd-panel');
  if (c.position_commands === 'hidden') {
    cp.classList.add('hidden');
  } else {
    cp.classList.remove('hidden');
    cp.classList.toggle('pos-right', c.position_commands === 'right');
  }

  // Next Up hidden override
  if (c.show_next_up === false) document.getElementById('next-up').classList.add('hidden');

  renderAll();
}

function toggle(id, show, cls = 'hidden') {
  const el = document.getElementById(id);
  if (!el) return;
  if (show) el.classList.remove(cls);
  else      el.classList.add(cls);
}

function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16),
        g = parseInt(hex.slice(3,5),16),
        b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* ── SSE ───────────────────────────────────────────────── */
function connectSSE() {
  const es = new EventSource(`${API}/overlay/events`);

  es.addEventListener('init', e => {
    const d = JSON.parse(e.data);
    Object.assign(state, d);
    renderAll();
    if (d.commands) renderCommands(d.commands);
  });

  es.addEventListener('player_state', e => {
    const d = JSON.parse(e.data);
    const songChanged = state.current_song?.title !== d.current_song?.title;
    Object.assign(state, d);
    renderAll();
    if (songChanged && d.current_song) showNextUp(state.queue[0] || null);
  });

  es.addEventListener('tiktok_request', e => {
    addRequestToFeed(JSON.parse(e.data));
  });

  es.addEventListener('subtitle', e => {
    const d = JSON.parse(e.data);
    // d.text        — full subtitle line (required)
    // d.words       — [{word, start, end}] for karaoke (optional)
    // d.duration_ms — how long to show (optional, default 4000)
    // d.song_hint   — small label below (optional)
    showSubtitle(d.text, d.words || null, d.duration_ms || 4000, d.song_hint || null);
  });

  es.addEventListener('subtitle_clear', () => {
    clearSubtitle(false);
  });

  es.addEventListener('skip_vote', e => {
    const d = JSON.parse(e.data);
    state.skip_votes = d.votes; state.skip_threshold = d.threshold;
    updateSkipVoteBar();
  });

  es.addEventListener('skip_executed', () => {
    state.skip_votes = 0; updateSkipVoteBar();
  });

  es.addEventListener('tiktok_status', e => {
    state.tiktok_connected = JSON.parse(e.data).connected;
    updateTikTokDot();
  });

  es.addEventListener('player_stopped', () => {
    state.current_song = null; state.is_playing = false;
    state.skip_votes = 0;
    renderNowPlaying(); updateSkipVoteBar();
  });

  es.addEventListener('overlay_config', e => {
    applyConfig(JSON.parse(e.data));
  });

  es.onerror = () => {
    es.close();
    setTimeout(() => { pollFallback(); setTimeout(connectSSE, 5000); }, 2000);
  };
}

/* ── Polling fallback ───────────────────────────────────── */
async function pollFallback() {
  try {
    const r = await fetch(`${API}/overlay/state`);
    if (r.ok) { Object.assign(state, await r.json()); renderAll(); }
  } catch(_) {}
}

/* ── Render ─────────────────────────────────────────────── */
function renderAll() {
  renderNowPlaying();
  renderQueue();
  renderRequests();
  updateTikTokDot();
  updateSkipVoteBar();
}

function renderNowPlaying() {
  const song   = state.current_song;
  const title  = document.getElementById('np-title');
  const chanEl = document.getElementById('np-channel');
  const reqEl  = document.getElementById('np-requester');
  const thumb  = document.getElementById('np-thumb');
  const disc   = document.getElementById('np-disc');
  const badge  = document.getElementById('np-queue-badge');

  badge.textContent = `📋 ${state.queue_count} in queue`;

  if (!song || !state.is_playing) {
    title.textContent = 'Menunggu lagu…'; title.className = 'idle';
    chanEl.textContent = ''; reqEl.classList.add('hidden');
    thumb.classList.add('hidden'); disc.style.display = 'flex'; disc.className = '';
    stopProgress(); return;
  }

  title.textContent = song.title; title.className = '';

  // Channel
  if (cfg.show_channel !== false) {
    chanEl.textContent = song.channel || '';
    chanEl.classList.remove('hidden');
  } else {
    chanEl.classList.add('hidden');
  }

  // Requester badge
  if (song.requested_by && cfg.show_requester !== false) {
    reqEl.textContent = '👤 @' + song.requested_by;
    reqEl.classList.remove('hidden');
  } else {
    reqEl.classList.add('hidden');
  }

  // Thumbnail vs disc
  if (song.thumbnail && cfg.show_thumbnail !== false) {
    thumb.src = song.thumbnail;
    thumb.classList.remove('hidden'); disc.style.display = 'none';
  } else {
    thumb.classList.add('hidden'); disc.style.display = 'flex';
  }
  disc.className = state.is_paused ? 'paused' : '';

  if (state.is_playing && !state.is_paused) {
    songStartedAt   = Date.now() - (state.elapsed_ms || 0);
    songDurationMs  = (song.duration || 0) * 1000;
    startProgress();
  } else {
    stopProgress();
  }
}

function startProgress() {
  stopProgress();
  if (!songDurationMs || cfg.show_progress_bar === false) return;
  const bar = document.getElementById('np-progress-bar');
  progressTimer = setInterval(() => {
    const pct = Math.min(100, ((Date.now() - songStartedAt) / songDurationMs) * 100);
    bar.style.width = pct + '%';
    if (pct >= 100) stopProgress();
  }, 500);
}
function stopProgress() {
  if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
  document.getElementById('np-progress-bar').style.width = '0%';
}

function renderQueue() {
  const list  = document.getElementById('queue-list');
  const items = state.queue || [];
  const limit = cfg.max_queue_items || 6;
  if (!items.length) { list.innerHTML = '<div class="q-empty">Antrian kosong</div>'; return; }
  list.innerHTML = items.slice(0, limit).map((song, i) => {
    const t  = typeof song === 'string' ? song : (song.title || '?');
    const by = typeof song === 'object' && song.requested_by ? song.requested_by : '';
    return `<div class="q-row">
      <div class="q-num">${i+1}</div>
      <div class="q-title" title="${esc(t)}">${esc(t)}</div>
      ${by ? `<div class="q-by">@${esc(by)}</div>` : ''}
    </div>`;
  }).join('');
}

function renderRequests() {
  const list  = document.getElementById('req-list');
  const items = state.recent_requests || [];
  const limit = cfg.max_request_items || 8;
  if (!items.length) {
    list.innerHTML = '<div class="q-empty" style="padding:10px 0">Belum ada request</div>';
    return;
  }
  list.innerHTML = items.slice(0, limit).map(buildReqItem).join('');
}

function addRequestToFeed(data) {
  state.recent_requests = state.recent_requests || [];
  const ex = state.recent_requests.find(r => r.user === data.user && r.text === data.query);
  if (ex) { ex.status = data.status; if (data.song_title) ex.song_title = data.song_title; }
  else {
    state.recent_requests.unshift({
      type: 'request', user: data.user, text: data.query,
      status: data.status, song_title: data.song_title,
    });
    state.recent_requests = state.recent_requests.slice(0, 20);
  }
  renderRequests();
}

function buildReqItem(r) {
  const isSkip = r.type === 'skip';
  const icon   = isSkip ? '⏭' : '🎵';
  const badges = { queued:'✅', searching:'🔍', not_found:'❌', error:'⚠️', skip:'🗳️' };
  const sl     = isSkip ? 'skip' : (r.status || 'queued');
  return `<div class="req-item">
    <div class="req-icon">${icon}</div>
    <div class="req-body">
      <div class="req-user">@${esc(r.user||'')}</div>
      <div class="req-text">${esc(r.song_title||r.text||'')}</div>
    </div>
    <div class="req-status ${esc(sl)}">${badges[sl]||''}</div>
  </div>`;
}

function updateSkipVoteBar() {
  const bar       = document.getElementById('skip-vote-bar');
  const dots      = document.getElementById('skip-vote-dots');
  const countEl   = document.getElementById('skip-vote-count');
  const votes     = state.skip_votes   || 0;
  const threshold = state.skip_threshold || 5;
  countEl.textContent = `${votes}/${threshold}`;
  dots.innerHTML = Array.from({length: threshold}, (_,i) =>
    `<div class="skip-dot${i < votes ? ' filled' : ''}"></div>`
  ).join('');
  if (cfg.show_skip_vote !== false) bar.classList.toggle('visible', votes > 0);
}

function updateTikTokDot() {
  const dot = document.getElementById('tiktok-dot');
  if (cfg.show_tiktok_dot === false) { dot.classList.add('off'); return; }
  dot.classList.remove('off');
  dot.classList.toggle('online', !!state.tiktok_connected);
}

function renderCommands(cmds) {
  const rows = document.getElementById('cmd-rows');
  const entries = [
    { key:'request', label:'Request lagu' },
    { key:'skip',    label:'Vote skip' },
    { key:'queue',   label:'Lihat antrian' },
  ];
  rows.innerHTML = entries.map(e => {
    const list = cmds[e.key] || [];
    if (!list.length) return '';
    return `<div class="cmd-row">
      <span class="cmd-tag">${esc(list[0])}</span>
      <span class="cmd-desc">${esc(e.label)}</span>
    </div>`;
  }).join('');
}

function showNextUp(next) {
  if (cfg.show_next_up === false) return;
  if (nextUpTimer) clearTimeout(nextUpTimer);
  const el = document.getElementById('next-up');
  if (el.classList.contains('hidden')) return;
  const t = typeof next === 'string' ? next : next?.title;
  if (!t) return;
  document.getElementById('next-up-title').textContent = t;
  el.classList.add('visible');
  nextUpTimer = setTimeout(() => el.classList.remove('visible'), 5000);
}

/* ── Subtitle ────────────────────────────────────────────── */
function showSubtitle(text, words, durationMs, songHint) {
  if (cfg.show_subtitle === false) return;
  if (!text) { clearSubtitle(false); return; }

  const panel  = document.getElementById('subtitle-panel');
  const bg     = document.getElementById('subtitle-bg');
  const textEl = document.getElementById('subtitle-text');
  const hint   = document.getElementById('subtitle-song-hint');

  // Cancel pending timers
  if (subtitleHideTimer) { clearTimeout(subtitleHideTimer); subtitleHideTimer = null; }
  karaokeTimers.forEach(t => clearTimeout(t));
  karaokeTimers = [];

  const doShow = () => {
    // Song hint label
    if (songHint) {
      hint.textContent = songHint;
      hint.classList.add('visible');
    } else {
      hint.classList.remove('visible');
    }

    if (words && words.length > 0) {
      // Karaoke mode: render spans, then highlight word-by-word
      textEl.innerHTML = words.map((w, i) =>
        `<span class="sub-word" id="sw-${i}">${esc(w.word)}</span>`
      ).join('&nbsp;');

      words.forEach((w, i) => {
        if (w.start == null) return;
        const tOn = setTimeout(() => {
          const span = document.getElementById(`sw-${i}`);
          if (!span) return;
          span.classList.remove('done');
          span.classList.add('active');
          if (i > 0) {
            const prev = document.getElementById(`sw-${i-1}`);
            if (prev) { prev.classList.remove('active'); prev.classList.add('done'); }
          }
        }, w.start * 1000);
        karaokeTimers.push(tOn);
        if (w.end != null) {
          const tOff = setTimeout(() => {
            const span = document.getElementById(`sw-${i}`);
            if (span) { span.classList.remove('active'); span.classList.add('done'); }
          }, w.end * 1000);
          karaokeTimers.push(tOff);
        }
      });
    } else {
      // Plain text mode — style all text as active (bright)
      textEl.innerHTML = text.split(' ').map(w =>
        `<span class="sub-word active">${esc(w)}</span>`
      ).join('&nbsp;');
    }

    panel.classList.remove('hidden');
    bg.classList.remove('entering', 'leaving', 'glow');
    void bg.offsetWidth; // reflow
    bg.classList.add('entering');
    bg.addEventListener('animationend', () => bg.classList.remove('entering'), { once: true });
    subtitleVisible = true;

    subtitleHideTimer = setTimeout(() => clearSubtitle(false), durationMs);
  };

  // If already visible, animate out first then back in
  if (subtitleVisible) {
    bg.classList.add('leaving');
    bg.addEventListener('animationend', () => {
      bg.classList.remove('leaving');
      subtitleVisible = false;
      doShow();
    }, { once: true });
  } else {
    doShow();
  }
}

function clearSubtitle(instant) {
  if (subtitleHideTimer) { clearTimeout(subtitleHideTimer); subtitleHideTimer = null; }
  karaokeTimers.forEach(t => clearTimeout(t));
  karaokeTimers = [];

  const panel  = document.getElementById('subtitle-panel');
  const bg     = document.getElementById('subtitle-bg');

  if (instant || !subtitleVisible) {
    panel.classList.add('hidden');
    subtitleVisible = false;
    return;
  }
  bg.classList.remove('entering');
  bg.classList.add('leaving');
  bg.addEventListener('animationend', () => {
    panel.classList.add('hidden');
    bg.classList.remove('leaving');
    subtitleVisible = false;
  }, { once: true });
}

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ── Init ───────────────────────────────────────────────── */
async function init() {
  try {
    const r = await fetch(`${API}/overlay/config`);
    if (r.ok) applyConfig(await r.json());
  } catch (_) {}
  connectSSE();
  setInterval(pollFallback, 10000);
}

init();
</script>
