<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OBS – Requests</title>
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --accent:#f97316; --accent2:#a855f7; --border:rgba(249,115,22,0.3);
    --green:#22c55e; --red:#ef4444; --yellow:#facc15;
    --text:#f1f5f9; --muted:#94a3b8; --opacity:0.82; --radius:14px;
    --shadow:0 8px 32px rgba(0,0,0,0.6);
  }
  html, body { width:1920px; height:1080px; overflow:hidden; background:transparent;
    font-family:'Segoe UI',system-ui,sans-serif; color:var(--text); }

  #req-panel {
    position:fixed; top:20px; right:20px; width:320px;
    transition:right .3s,left .3s;
  }
  #req-panel.pos-left { right:auto; left:20px; }
  #req-panel.hidden { display:none; }

  .panel-card { background:rgba(10,10,20,var(--opacity)); border:1px solid var(--border);
    border-radius:var(--radius); overflow:hidden; backdrop-filter:blur(12px); box-shadow:var(--shadow); }
  .panel-header { display:flex; align-items:center; gap:8px; padding:10px 14px;
    border-bottom:1px solid rgba(255,255,255,.06); font-size:11px; text-transform:uppercase;
    letter-spacing:1.5px; font-weight:700; color:var(--accent); }

  #req-feed { max-height: 900px; overflow:hidden; }
  #req-list { padding:6px 12px 10px; display:flex; flex-direction:column; gap:4px; }
  .req-item { display:flex; align-items:flex-start; gap:8px; padding:7px 9px; border-radius:9px;
    background:rgba(15,15,30,0.75); border:1px solid rgba(255,255,255,.05); animation:slideIn .35s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
  .req-icon { font-size:14px; flex-shrink:0; margin-top:1px; }
  .req-body { flex:1; min-width:0; }
  .req-user { font-size:11px; font-weight:700; color:#fb923c; margin-bottom:1px; }
  .req-text { font-size:11px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .req-status { font-size:10px; flex-shrink:0; margin-top:2px; font-weight:700; }
  .req-status.queued { color:var(--green); }
  .req-status.searching { color:var(--yellow); }
  .req-status.not_found { color:var(--red); }
  .req-status.error { color:var(--red); }
  .req-status.skip { color:var(--yellow); }
  .q-empty { font-size:12px; color:var(--muted); text-align:center; padding:10px 0; font-style:italic; }
</style>
</head>
<body>
<div id="req-panel">
  <div class="panel-card">
    <div id="req-feed">
      <div class="panel-header">💬 Request TikTok</div>
      <div id="req-list"><div class="q-empty">Belum ada request</div></div>
    </div>
  </div>
</div>
<script>
const API='http://localhost:8000';
let state={recent_requests:[]};
let cfg={};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function applyConfig(c){
  cfg=c;
  document.documentElement.style.setProperty('--accent',c.accent_color||'#f97316');
  document.documentElement.style.setProperty('--border',hexAlpha(c.accent_color||'#f97316',0.3));
  document.documentElement.style.setProperty('--opacity',c.opacity_panels||0.82);
  const rp=document.getElementById('req-panel');
  toggle('req-panel',c.show_request_feed!==false);
  rp.classList.toggle('pos-left',c.position_queue==='left');
}
function toggle(id,show,cls='hidden'){const el=document.getElementById(id);if(!el)return;show?el.classList.remove(cls):el.classList.add(cls);}
function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

function renderRequests(){
  const list=document.getElementById('req-list');
  const items=state.recent_requests||[];
  const limit=cfg.max_request_items||8;
  if(!items.length){list.innerHTML='<div class="q-empty">Belum ada request</div>';return;}
  list.innerHTML=items.slice(0,limit).map(r=>{
    const isSkip=r.type==='skip';
    const icon=isSkip?'⏭':'🎵';
    const badges={queued:'✅',searching:'🔍',not_found:'❌',error:'⚠️',skip:'🗳️'};
    const sl=isSkip?'skip':(r.status||'queued');
    return`<div class="req-item"><div class="req-icon">${icon}</div><div class="req-body"><div class="req-user">@${esc(r.user||'')}</div><div class="req-text">${esc(r.song_title||r.text||'')}</div></div><div class="req-status ${esc(sl)}">${badges[sl]||''}</div></div>`;
  }).join('');
}

function addRequest(data){
  state.recent_requests=state.recent_requests||[];
  const ex=state.recent_requests.find(r=>r.user===data.user&&r.text===data.query);
  if(ex){ex.status=data.status;if(data.song_title)ex.song_title=data.song_title;}
  else{state.recent_requests.unshift({type:'request',user:data.user,text:data.query,status:data.status,song_title:data.song_title});state.recent_requests=state.recent_requests.slice(0,20);}
  renderRequests();
}

function connectSSE(){
  const es=new EventSource(`${API}/overlay/events`);
  es.addEventListener('init',e=>{const d=JSON.parse(e.data);Object.assign(state,d);renderRequests();});
  es.addEventListener('tiktok_request',e=>{addRequest(JSON.parse(e.data));});
  es.addEventListener('overlay_config',e=>{applyConfig(JSON.parse(e.data));});
  es.onerror=()=>{es.close();setTimeout(connectSSE,5000);};
}
async function poll(){try{const r=await fetch(`${API}/overlay/state`);if(r.ok){Object.assign(state,await r.json());renderRequests();}}catch(_){}}
async function init(){try{const r=await fetch(`${API}/overlay/config`);if(r.ok)applyConfig(await r.json());}catch(_){}connectSSE();setInterval(poll,15000);}
init();
</script>
</body>
</html>
