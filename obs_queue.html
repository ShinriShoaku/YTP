<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OBS – Queue</title>
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --accent:#f97316; --accent2:#a855f7; --border:rgba(249,115,22,0.3);
    --text:#f1f5f9; --muted:#94a3b8; --opacity:0.82; --radius:14px;
    --shadow:0 8px 32px rgba(0,0,0,0.6);
  }
  html, body { width:1920px; height:1080px; overflow:hidden; background:transparent;
    font-family:'Segoe UI',system-ui,sans-serif; color:var(--text); }

  #queue-panel {
    position:fixed; top:20px; right:20px; width:340px;
    transition:right .3s,left .3s;
  }
  #queue-panel.pos-left { right:auto; left:20px; }
  #queue-panel.hidden { display:none; }

  .panel-card { background:rgba(10,10,20,var(--opacity)); border:1px solid var(--border);
    border-radius:var(--radius); overflow:hidden; backdrop-filter:blur(12px); box-shadow:var(--shadow); }
  .panel-header { display:flex; align-items:center; gap:8px; padding:10px 14px;
    border-bottom:1px solid rgba(255,255,255,.06); font-size:11px; text-transform:uppercase;
    letter-spacing:1.5px; font-weight:700; color:var(--accent); }

  /* Now-playing mini badge at top of queue */
  #np-mini { padding:8px 12px 6px; border-bottom:1px solid rgba(255,255,255,.06); }
  #np-mini-inner { display:flex; align-items:center; gap:8px;
    background:rgba(249,115,22,.08); border:1px solid rgba(249,115,22,.2);
    border-radius:9px; padding:7px 10px; }
  #np-mini-icon { font-size:16px; animation:spin 3s linear infinite; flex-shrink:0; }
  @keyframes spin { to{transform:rotate(360deg);} }
  #np-mini-icon.paused { animation-play-state:paused; }
  #np-mini-icon.idle { animation:none; }
  #np-mini-title { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); }
  #np-mini-sub { font-size:10px; color:#fb923c; margin-top:1px; }
  #np-mini.hidden { display:none; }

  #queue-list { padding:8px 12px 10px; }
  .q-row { display:flex; align-items:center; gap:10px; padding:7px 0;
    border-bottom:1px solid rgba(255,255,255,.04); animation:slideIn .3s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:translateX(0)} }
  .q-row:last-child { border-bottom:none; }
  .q-num { font-size:11px; color:var(--accent); font-weight:800; width:18px; flex-shrink:0; text-align:center; }
  .q-title { font-size:12px; font-weight:600; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .q-by { font-size:10px; color:var(--muted); flex-shrink:0; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .q-empty { font-size:12px; color:var(--muted); text-align:center; padding:12px 0; font-style:italic; }

  /* Next up footer */
  #queue-footer { padding:6px 12px 8px; border-top:1px solid rgba(255,255,255,.05); }
  #queue-total { font-size:10px; color:var(--muted); text-align:center; }
</style>
</head>
<body>
<div id="queue-panel">
  <div class="panel-card">
    <div class="panel-header">📋 Antrian</div>
    <div id="np-mini" class="hidden">
      <div id="np-mini-inner">
        <div id="np-mini-icon">🎵</div>
        <div>
          <div id="np-mini-title">–</div>
          <div id="np-mini-sub">Now Playing</div>
        </div>
      </div>
    </div>
    <div id="queue-list"><div class="q-empty">Antrian kosong</div></div>
    <div id="queue-footer"><div id="queue-total"></div></div>
  </div>
</div>
<script>
const API='http://localhost:8000';
let state={current_song:null,is_playing:false,is_paused:false,queue:[],queue_count:0};
let cfg={};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function applyConfig(c){
  cfg=c;
  document.documentElement.style.setProperty('--accent',c.accent_color||'#f97316');
  document.documentElement.style.setProperty('--accent2',c.accent_color2||'#a855f7');
  document.documentElement.style.setProperty('--border',hexAlpha(c.accent_color||'#f97316',0.3));
  document.documentElement.style.setProperty('--opacity',c.opacity_panels||0.82);
  toggle('queue-panel',c.show_queue!==false);
  const qp=document.getElementById('queue-panel');
  qp.classList.toggle('pos-left',c.position_queue==='left');
  renderAll();
}
function toggle(id,show,cls='hidden'){const el=document.getElementById(id);if(!el)return;show?el.classList.remove(cls):el.classList.add(cls);}
function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

function renderAll(){renderNowPlayingMini();renderQueue();}

function renderNowPlayingMini(){
  const mini=document.getElementById('np-mini');
  const icon=document.getElementById('np-mini-icon');
  const titleEl=document.getElementById('np-mini-title');
  const song=state.current_song;
  if(!song||!state.is_playing){mini.classList.add('hidden');return;}
  mini.classList.remove('hidden');
  titleEl.textContent=song.title;
  icon.className=state.is_paused?'paused':'';
}

function renderQueue(){
  const list=document.getElementById('queue-list');
  const total=document.getElementById('queue-total');
  const items=state.queue||[];
  const limit=cfg.max_queue_items||6;
  const count=state.queue_count||items.length;
  if(!items.length){list.innerHTML='<div class="q-empty">Antrian kosong</div>';total.textContent='';return;}
  list.innerHTML=items.slice(0,limit).map((song,i)=>{
    const t=typeof song==='string'?song:(song.title||song?.song?.title||'?');
    const by=typeof song==='object'&&(song.requested_by||song?.song?.requested_by)||'';
    return`<div class="q-row"><div class="q-num">${i+1}</div><div class="q-title" title="${esc(t)}">${esc(t)}</div>${by?`<div class="q-by">@${esc(by)}</div>`:''}</div>`;
  }).join('');
  total.textContent=count>limit?`+${count-limit} lagu lagi dalam antrian`:'';
}

function connectSSE(){
  const es=new EventSource(`${API}/overlay/events`);
  es.addEventListener('init',e=>{Object.assign(state,JSON.parse(e.data));renderAll();});
  es.addEventListener('player_state',e=>{Object.assign(state,JSON.parse(e.data));renderAll();});
  es.addEventListener('player_stopped',()=>{state.current_song=null;state.is_playing=false;renderAll();});
  es.addEventListener('overlay_config',e=>{applyConfig(JSON.parse(e.data));});
  es.onerror=()=>{es.close();setTimeout(()=>{poll();setTimeout(connectSSE,5000);},2000);};
}
async function poll(){try{const r=await fetch(`${API}/overlay/state`);if(r.ok){Object.assign(state,await r.json());renderAll();}}catch(_){}}
async function init(){try{const r=await fetch(`${API}/overlay/config`);if(r.ok)applyConfig(await r.json());}catch(_){}connectSSE();setInterval(poll,10000);}
init();
</script>
</body>
</html>
