<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OBS – Now Playing</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --orange: #f97316; --pink: #ec4899; --purple: #a855f7;
    --green: #22c55e;  --red: #ef4444; --yellow: #facc15;
    --text: #f1f5f9;   --muted: #94a3b8;
    --accent: #f97316; --accent2: #a855f7;
    --opacity: 0.82;   --title-size: 20px;
  }
  html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent;
    font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text); }

  #now-playing {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,10,20,var(--opacity));
    border-top: 2px solid var(--accent);
    display: flex; align-items: center; gap: 16px; padding: 12px 24px;
    min-height: 88px; backdrop-filter: blur(12px);
    box-shadow: 0 -4px 24px rgba(0,0,0,0.5); overflow: hidden;
  }
  #now-playing::before {
    content:''; position:absolute; inset:0;
    background: linear-gradient(90deg, rgba(249,115,22,0.08) 0%, transparent 40%,
      transparent 60%, rgba(168,85,247,0.06) 100%);
    pointer-events:none;
  }
  #now-playing.hidden { display:none; }

  #np-disc {
    width:60px; height:60px; border-radius:50%;
    background: radial-gradient(circle,#2d1b69,#1a1a2e);
    border:2px solid var(--accent2); display:flex; align-items:center; justify-content:center;
    font-size:22px; flex-shrink:0; animation:spin 4s linear infinite;
    box-shadow:0 0 14px rgba(168,85,247,0.4);
  }
  #np-disc.paused { animation-play-state:paused; }
  #np-disc.hidden { display:none !important; }
  @keyframes spin { to { transform:rotate(360deg); } }

  #np-thumb { width:60px; height:60px; border-radius:8px; object-fit:cover;
    background:#1e1e2e; flex-shrink:0; border:2px solid rgba(249,115,22,0.3);
    box-shadow:0 0 12px rgba(249,115,22,0.3); }
  #np-thumb.hidden { display:none; }

  #np-info { flex:1; min-width:0; }
  #np-label { font-size:10px; text-transform:uppercase; letter-spacing:2px;
    color:var(--accent); font-weight:700; margin-bottom:3px; }
  #tiktok-dot { width:8px; height:8px; border-radius:50%; background:var(--red);
    display:inline-block; margin-right:4px; transition:background .3s; }
  #tiktok-dot.online { background:var(--green); box-shadow:0 0 6px var(--green); animation:pdot 2s infinite; }
  #tiktok-dot.off { display:none; }
  @keyframes pdot { 0%,100%{opacity:1} 50%{opacity:.5} }

  #np-title { font-size:var(--title-size); font-weight:800; line-height:1.2;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 2px 8px rgba(0,0,0,.6); }
  #np-title.idle { color:var(--muted); font-weight:400; font-size:15px; }
  #np-meta { font-size:12px; color:var(--muted); margin-top:3px; display:flex; align-items:center; gap:8px; }
  #np-channel.hidden { display:none; }
  #np-requester { background:rgba(249,115,22,.15); border:1px solid rgba(249,115,22,.3);
    border-radius:20px; padding:1px 8px; font-size:11px; color:#fb923c; font-weight:600; }
  #np-requester.hidden { display:none; }

  #np-progress-wrap { position:absolute; bottom:0; left:0; right:0; height:3px; background:rgba(255,255,255,.08); }
  #np-progress-wrap.hidden { display:none; }
  #np-progress-bar { height:100%; background:linear-gradient(90deg,var(--accent),var(--pink));
    width:0%; transition:width 1s linear; box-shadow:0 0 8px rgba(249,115,22,.8); }

  #np-right { display:flex; flex-direction:column; align-items:flex-end; gap:8px; flex-shrink:0; }
  #np-queue-badge { background:rgba(168,85,247,.18); border:1px solid rgba(168,85,247,.4);
    border-radius:20px; padding:4px 12px; font-size:12px; color:#c084fc; font-weight:700; }
  #skip-vote-bar { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); opacity:0; transition:opacity .3s; }
  #skip-vote-bar.visible { opacity:1; }
  #skip-vote-bar.hidden { display:none !important; }
  #skip-vote-dots { display:flex; gap:3px; }
  .skip-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.15); transition:background .2s; }
  .skip-dot.filled { background:var(--yellow); box-shadow:0 0 4px var(--yellow); }
</style>
</head>
<body>
<div id="now-playing">
  <div id="np-disc">🎵</div>
  <img id="np-thumb" class="hidden" alt="">
  <div id="np-info">
    <div id="np-label"><span id="tiktok-dot"></span>▶ Now Playing</div>
    <div id="np-title" class="idle">Menunggu lagu…</div>
    <div id="np-meta">
      <span id="np-channel"></span>
      <span id="np-requester" class="hidden"></span>
    </div>
  </div>
  <div id="np-right">
    <div id="np-queue-badge">📋 0 in queue</div>
    <div id="skip-vote-bar">
      <span>⏭ Skip</span>
      <div id="skip-vote-dots"></div>
      <span id="skip-vote-count">0/5</span>
    </div>
  </div>
  <div id="np-progress-wrap"><div id="np-progress-bar"></div></div>
</div>
<script>
const API = 'http://localhost:8000';
let state = { current_song:null, is_playing:false, is_paused:false, queue_count:0,
  tiktok_connected:false, skip_votes:0, skip_threshold:5, elapsed_ms:0 };
let cfg = {};
let songStartedAt=0, songDurationMs=0, progressTimer=null;

function applyConfig(c) {
  cfg = c;
  document.documentElement.style.setProperty('--accent', c.accent_color||'#f97316');
  document.documentElement.style.setProperty('--accent2', c.accent_color2||'#a855f7');
  document.documentElement.style.setProperty('--title-size', (c.font_size_title||20)+'px');
  document.documentElement.style.setProperty('--opacity', c.opacity_panels||0.82);
  toggle('now-playing', c.show_now_playing!==false);
  toggle('skip-vote-bar', c.show_skip_vote!==false, 'hidden');
  toggle('np-progress-wrap', c.show_progress_bar!==false);
  const dot=document.getElementById('tiktok-dot');
  if(c.show_tiktok_dot===false) dot.classList.add('off'); else dot.classList.remove('off');
  render();
}
function toggle(id,show,cls='hidden'){const el=document.getElementById(id);if(!el)return;show?el.classList.remove(cls):el.classList.add(cls);}
function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

function render() {
  const song=state.current_song;
  const title=document.getElementById('np-title');
  const chanEl=document.getElementById('np-channel');
  const reqEl=document.getElementById('np-requester');
  const thumb=document.getElementById('np-thumb');
  const disc=document.getElementById('np-disc');
  document.getElementById('np-queue-badge').textContent=`📋 ${state.queue_count||0} in queue`;
  if(!song||!state.is_playing){
    title.textContent='Menunggu lagu…'; title.className='idle';
    chanEl.textContent=''; reqEl.classList.add('hidden');
    thumb.classList.add('hidden'); disc.style.display='flex'; disc.className='';
    stopProgress(); return;
  }
  title.textContent=song.title; title.className='';
  chanEl.textContent=cfg.show_channel!==false?song.channel||'':''; 
  cfg.show_channel!==false?chanEl.classList.remove('hidden'):chanEl.classList.add('hidden');
  if(song.requested_by&&cfg.show_requester!==false){reqEl.textContent='👤 @'+song.requested_by;reqEl.classList.remove('hidden');}
  else reqEl.classList.add('hidden');
  if(song.thumbnail&&cfg.show_thumbnail!==false){thumb.src=song.thumbnail;thumb.classList.remove('hidden');disc.style.display='none';}
  else{thumb.classList.add('hidden');disc.style.display='flex';}
  disc.className=state.is_paused?'paused':'';
  if(state.is_playing&&!state.is_paused){songStartedAt=Date.now()-(state.elapsed_ms||0);songDurationMs=(song.duration||0)*1000;startProgress();}
  else stopProgress();
}
function startProgress(){stopProgress();if(!songDurationMs||cfg.show_progress_bar===false)return;const bar=document.getElementById('np-progress-bar');progressTimer=setInterval(()=>{const p=Math.min(100,((Date.now()-songStartedAt)/songDurationMs)*100);bar.style.width=p+'%';if(p>=100)stopProgress();},500);}
function stopProgress(){if(progressTimer){clearInterval(progressTimer);progressTimer=null;}document.getElementById('np-progress-bar').style.width='0%';}
function updateSkipVote(){const bar=document.getElementById('skip-vote-bar');const dots=document.getElementById('skip-vote-dots');const countEl=document.getElementById('skip-vote-count');const v=state.skip_votes||0,t=state.skip_threshold||5;countEl.textContent=`${v}/${t}`;dots.innerHTML=Array.from({length:t},(_,i)=>`<div class="skip-dot${i<v?' filled':''}"></div>`).join('');if(cfg.show_skip_vote!==false)bar.classList.toggle('visible',v>0);}
function updateDot(){const d=document.getElementById('tiktok-dot');if(cfg.show_tiktok_dot===false){d.classList.add('off');return;}d.classList.remove('off');d.classList.toggle('online',!!state.tiktok_connected);}

function connectSSE(){
  const es=new EventSource(`${API}/overlay/events`);
  es.addEventListener('init',e=>{Object.assign(state,JSON.parse(e.data));render();updateSkipVote();updateDot();});
  es.addEventListener('player_state',e=>{Object.assign(state,JSON.parse(e.data));render();});
  es.addEventListener('skip_vote',e=>{const d=JSON.parse(e.data);state.skip_votes=d.votes;state.skip_threshold=d.threshold;updateSkipVote();});
  es.addEventListener('skip_executed',()=>{state.skip_votes=0;updateSkipVote();});
  es.addEventListener('tiktok_status',e=>{state.tiktok_connected=JSON.parse(e.data).connected;updateDot();});
  es.addEventListener('player_stopped',()=>{state.current_song=null;state.is_playing=false;state.skip_votes=0;render();updateSkipVote();});
  es.addEventListener('overlay_config',e=>{applyConfig(JSON.parse(e.data));});
  es.onerror=()=>{es.close();setTimeout(()=>{poll();setTimeout(connectSSE,5000);},2000);};
}
async function poll(){try{const r=await fetch(`${API}/overlay/state`);if(r.ok){Object.assign(state,await r.json());render();}}catch(_){}}
async function init(){try{const r=await fetch(`${API}/overlay/config`);if(r.ok)applyConfig(await r.json());}catch(_){}connectSSE();setInterval(poll,10000);}
init();
</script>
</body>
</html>
