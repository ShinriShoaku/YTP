<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OBS – Commands</title>
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --accent:#f97316; --accent2:#a855f7; --border:rgba(249,115,22,0.3);
    --text:#f1f5f9; --muted:#94a3b8; --opacity:0.82; --radius:14px;
    --shadow:0 8px 32px rgba(0,0,0,0.6);
  }
  html, body { width:1920px; height:1080px; overflow:hidden; background:transparent;
    font-family:'Segoe UI',system-ui,sans-serif; color:var(--text); }

  #cmd-panel {
    position:fixed; top:20px; left:20px; width:240px;
    transition:left .3s,right .3s;
  }
  #cmd-panel.pos-right { left:auto; right:20px; }
  #cmd-panel.hidden { display:none; }

  .panel-card { background:rgba(10,10,20,var(--opacity)); border:1px solid var(--border);
    border-radius:var(--radius); overflow:hidden; backdrop-filter:blur(12px); box-shadow:var(--shadow); }
  .panel-header { display:flex; align-items:center; gap:8px; padding:10px 14px;
    border-bottom:1px solid rgba(255,255,255,.06); font-size:11px; text-transform:uppercase;
    letter-spacing:1.5px; font-weight:700; color:var(--accent); }

  #cmd-rows { padding:10px 14px 12px; }
  .cmd-row { display:flex; gap:8px; align-items:center; margin-bottom:4px; }
  .cmd-tag { background:rgba(249,115,22,.15); border:1px solid rgba(249,115,22,.3);
    border-radius:6px; padding:2px 8px; font-size:11px; color:#fb923c; font-weight:700; font-family:monospace; }
  .cmd-desc { font-size:11px; color:var(--muted); }
  .cmd-divider { height:1px; background:rgba(255,255,255,.05); margin:6px 0; }

  /* TikTok info footer */
  #cmd-footer { padding:6px 14px 10px; }
  #tiktok-status { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--muted); }
  #tiktok-dot2 { width:7px; height:7px; border-radius:50%; background:#ef4444; flex-shrink:0; }
  #tiktok-dot2.online { background:#22c55e; box-shadow:0 0 5px #22c55e; animation:pdot 2s infinite; }
  @keyframes pdot { 0%,100%{opacity:1} 50%{opacity:.5} }
</style>
</head>
<body>
<div id="cmd-panel">
  <div class="panel-card">
    <div class="panel-header">💡 Commands</div>
    <div id="cmd-rows"></div>
    <div class="cmd-divider"></div>
    <div id="cmd-footer">
      <div id="tiktok-status">
        <div id="tiktok-dot2"></div>
        <span id="tiktok-label">TikTok Live</span>
      </div>
    </div>
  </div>
</div>
<script>
const API='http://localhost:8000';
let cfg={};
let tiktokConnected=false;
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function applyConfig(c){
  cfg=c;
  document.documentElement.style.setProperty('--accent',c.accent_color||'#f97316');
  document.documentElement.style.setProperty('--border',hexAlpha(c.accent_color||'#f97316',0.3));
  document.documentElement.style.setProperty('--opacity',c.opacity_panels||0.82);
  const cp=document.getElementById('cmd-panel');
  if(c.position_commands==='hidden'){cp.classList.add('hidden');return;}
  cp.classList.remove('hidden');
  cp.classList.toggle('pos-right',c.position_commands==='right');
}
function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

function renderCommands(cmds){
  const rows=document.getElementById('cmd-rows');
  const entries=[
    {key:'request',label:'Request lagu',icon:'🎵'},
    {key:'skip',label:'Vote skip',icon:'⏭'},
    {key:'queue',label:'Lihat antrian',icon:'📋'},
  ];
  rows.innerHTML=entries.map(e=>{
    const list=cmds[e.key]||[];
    if(!list.length)return'';
    return`<div class="cmd-row"><span class="cmd-tag">${esc(list[0])}</span><span class="cmd-desc">${e.icon} ${esc(e.label)}</span></div>`;
  }).join('');
}

function updateTikTok(connected){
  tiktokConnected=connected;
  const dot=document.getElementById('tiktok-dot2');
  const lbl=document.getElementById('tiktok-label');
  dot.className=connected?'online':'';
  lbl.textContent=connected?'TikTok Live ✓':'TikTok Offline';
}

function connectSSE(){
  const es=new EventSource(`${API}/overlay/events`);
  es.addEventListener('init',e=>{const d=JSON.parse(e.data);if(d.commands)renderCommands(d.commands);updateTikTok(!!d.tiktok_connected);});
  es.addEventListener('tiktok_status',e=>{updateTikTok(JSON.parse(e.data).connected);});
  es.addEventListener('overlay_config',e=>{applyConfig(JSON.parse(e.data));});
  es.onerror=()=>{es.close();setTimeout(connectSSE,5000);};
}
async function init(){
  try{const r=await fetch(`${API}/overlay/config`);if(r.ok)applyConfig(await r.json());}catch(_){}
  // Load commands from state
  try{const r=await fetch(`${API}/overlay/state`);if(r.ok){const d=await r.json();if(d.commands)renderCommands(d.commands);updateTikTok(!!d.tiktok_connected);}}catch(_){}
  connectSSE();
}
init();
</script>
</body>
</html>
