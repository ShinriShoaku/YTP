<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OBS – Subtitle</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1920px;height:1080px;overflow:hidden;background:transparent;
    font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased}

  /* ── WRAP: centered, bottom area ── */
  #sub-wrap{
    position:fixed;left:50%;bottom:120px;
    transform:translateX(-50%);
    width:min(1400px,88vw);
    display:flex;flex-direction:column;align-items:center;
    gap:14px;pointer-events:none;
  }
  #sub-wrap.hidden{display:none!important;}

  /* ── TEXT: no pill/box, pure text floating ── */
  #sub-text{
    font-size:var(--sz,40px);
    font-weight:800;
    line-height:1.35;
    text-align:center;
    color:#fff;
    letter-spacing:-0.5px;
    word-spacing:0.15em;
    filter:drop-shadow(0 2px 20px rgba(0,0,0,1)) drop-shadow(0 0 40px rgba(0,0,0,0.9));
    white-space:normal;overflow-wrap:break-word;
  }

  /* Plain mode words */
  .sw{
    display:inline-block;
    color:rgba(255,255,255,0.25);
    transition:color .06s,transform .06s;
    margin-right:0.28em;
  }
  .sw:last-child{margin-right:0;}
  .sw.done{color:rgba(255,255,255,0.18);}
  .sw.active{
    color:#fff;
    /* Scale up the active word — big zoom effect */
    transform:scale(1.12);
    display:inline-block;
    filter:drop-shadow(0 0 16px rgba(249,115,22,0.9)) drop-shadow(0 0 30px rgba(249,115,22,0.5));
    animation:wPop .1s cubic-bezier(.34,1.7,.64,1) both;
  }
  @keyframes wPop{from{transform:scale(.85);}to{transform:scale(1.12);}}

  /* Plain mode: teks langsung, tanpa span */
  #sub-text.plain{
    color:#fff;
  }

  /* ── PROGRESS: thin line, no pill ── */
  #sub-prog{
    width:min(500px,50%);height:2px;
    background:rgba(255,255,255,0.1);
    border-radius:999px;overflow:hidden;
  }
  #sub-prog.hidden{display:none;}
  #sub-prog-bar{
    height:100%;width:0%;
    background:linear-gradient(90deg,#f97316,#a855f7);
  }

  /* ── HINT ── */
  #sub-hint{
    font-size:10px;font-weight:600;letter-spacing:2.5px;
    text-transform:uppercase;color:rgba(255,255,255,0.3);
    display:none;
    filter:drop-shadow(0 1px 6px rgba(0,0,0,.8));
  }
  #sub-hint.show{display:block;}

  /* ── ENTER / LEAVE ── */
  #sub-text.entering{animation:textIn .4s cubic-bezier(.16,1,.3,1) both;}
  #sub-text.leaving{animation:textOut .22s ease both;}
  @keyframes textIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
  @keyframes textOut{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-12px);}}
</style>
</head>
<body>
<div id="sub-wrap" class="hidden">
  <div id="sub-text"></div>
  <div id="sub-prog" class="hidden"><div id="sub-prog-bar"></div></div>
  <div id="sub-hint"></div>
</div>
<script>
const API='http://localhost:8000';
let cfg={},visible=false,hideTimer=null,kTimers=[];
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function applyConfig(c){
  cfg=c||{};
  document.documentElement.style.setProperty('--sz',(c.subtitle_font_size||40)+'px');
  if(c.show_subtitle===false){clearSub(true);document.getElementById('sub-wrap').classList.add('hidden');}
}

function showSub(text,words,durMs,hint){
  if(cfg.show_subtitle===false||!text||!text.trim())return;
  clearTimers();
  const wrap=document.getElementById('sub-wrap');
  const textEl=document.getElementById('sub-text');
  const prog=document.getElementById('sub-prog');
  const bar=document.getElementById('sub-prog-bar');
  const hintEl=document.getElementById('sub-hint');
  if(hint){hintEl.textContent=hint;hintEl.classList.add('show');}else hintEl.classList.remove('show');

  const doRender=()=>{
    if(words&&Array.isArray(words)&&words.length){
      textEl.className='';
      textEl.innerHTML=words.map((w,i)=>`<span class="sw" id="sw${i}">${esc(w.word)}</span>`).join(' ');
      words.forEach((w,i)=>{
        if(w.start==null)return;
        kTimers.push(setTimeout(()=>{
          const cur=document.getElementById(`sw${i}`);
          if(cur){cur.classList.remove('done');cur.classList.add('active');}
          if(i>0){const p=document.getElementById(`sw${i-1}`);if(p){p.classList.remove('active');p.classList.add('done');}}
        },w.start*1000));
        if(w.end!=null)kTimers.push(setTimeout(()=>{const cur=document.getElementById(`sw${i}`);if(cur){cur.classList.remove('active');cur.classList.add('done');}},w.end*1000));
      });
    }else{
      textEl.className='plain';
      textEl.textContent=text;
    }

    if(durMs>0){
      prog.classList.remove('hidden');
      bar.style.transition='none';bar.style.width='0%';
      void bar.offsetWidth;
      bar.style.transition=`width ${durMs}ms linear`;
      bar.style.width='100%';
    }else prog.classList.add('hidden');

    wrap.classList.remove('hidden');
    textEl.classList.remove('entering','leaving');
    void textEl.offsetWidth;
    textEl.classList.add('entering');
    textEl.addEventListener('animationend',()=>textEl.classList.remove('entering'),{once:true});
    visible=true;
    hideTimer=setTimeout(()=>clearSub(false),durMs||4500);
  };

  if(visible){
    textEl.classList.add('leaving');
    textEl.addEventListener('animationend',()=>{textEl.classList.remove('leaving');visible=false;doRender();},{once:true});
  }else doRender();
}

function clearTimers(){
  if(hideTimer){clearTimeout(hideTimer);hideTimer=null;}
  kTimers.forEach(t=>clearTimeout(t));kTimers=[];
}

function clearSub(instant){
  clearTimers();
  const wrap=document.getElementById('sub-wrap');
  const textEl=document.getElementById('sub-text');
  document.getElementById('sub-prog-bar').style.width='0%';
  if(instant||!visible){wrap.classList.add('hidden');textEl.className='';visible=false;return;}
  textEl.classList.add('leaving');
  textEl.addEventListener('animationend',()=>{wrap.classList.add('hidden');textEl.classList.remove('leaving');visible=false;},{once:true});
}

function connectSSE(){
  const es=new EventSource(`${API}/overlay/events`);
  es.addEventListener('subtitle',e=>{const d=JSON.parse(e.data);showSub(d.text,d.words||null,d.duration_ms||4500,d.song_hint||null);});
  es.addEventListener('subtitle_clear',()=>clearSub(false));
  es.addEventListener('player_stopped',()=>clearSub(false));
  es.addEventListener('overlay_config',e=>applyConfig(JSON.parse(e.data)));
  es.onerror=()=>{es.close();setTimeout(connectSSE,5000);};
}
async function init(){
  try{const r=await fetch(`${API}/overlay/config`);if(r.ok)applyConfig(await r.json());}catch(_){}
  connectSSE();
}
init();
</script>
</body>
</html>
