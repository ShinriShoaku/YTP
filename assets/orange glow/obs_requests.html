<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OBS – Requests</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1920px;height:1080px;overflow:hidden;background:transparent;
    font-family:'Outfit',sans-serif;color:#fff;-webkit-font-smoothing:antialiased}

  /* Feed container — floats top-right, no background, no border */
  #req-feed{
    position:fixed;top:24px;right:28px;width:340px;
    display:flex;flex-direction:column;gap:0px;
    pointer-events:none;
  }
  #req-feed.pos-left{right:auto;left:28px;}
  #req-feed.hidden{display:none;}

  /* Each notification row — borderless, transparent bg, just text + avatar */
  .req-row{
    display:flex;align-items:center;gap:12px;
    padding:6px 0;
    /* Fade in from right */
    animation:rowIn .5s cubic-bezier(.16,1,.3,1) both;
    position:relative;
  }
  .req-row.removing{
    animation:rowOut .4s cubic-bezier(.4,0,1,1) both;
  }

  @keyframes rowIn{
    from{opacity:0;transform:translateX(40px);}
    to{opacity:1;transform:translateX(0);}
  }
  @keyframes rowOut{
    from{opacity:1;transform:translateX(0);}
    to{opacity:0;transform:translateX(40px);}
  }

  /* Avatar circle — small, colored by first letter */
  .req-avatar{
    width:36px;height:36px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;letter-spacing:0;
    /* color assigned in JS */
  }

  /* Text block */
  .req-meta{flex:1;min-width:0;}

  .req-user{
    font-size:12px;font-weight:600;
    color:rgba(255,255,255,0.55);
    letter-spacing:0.3px;
    line-height:1;margin-bottom:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }

  .req-song{
    font-size:15px;font-weight:700;
    color:#fff;
    line-height:1.2;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    text-shadow:0 1px 12px rgba(0,0,0,0.8);
  }

  /* Status dot — tiny circle on the right */
  .req-dot{
    width:8px;height:8px;border-radius:50%;flex-shrink:0;
    transition:background .3s;
  }
  .req-dot.queued  {background:#22c55e;box-shadow:0 0 6px #22c55e;}
  .req-dot.searching{background:#facc15;box-shadow:0 0 6px #facc15;animation:blink 1s infinite;}
  .req-dot.not_found{background:#ef4444;box-shadow:0 0 6px #ef4444;}
  .req-dot.error   {background:#ef4444;box-shadow:0 0 6px #ef4444;}
  .req-dot.skip    {background:#a855f7;box-shadow:0 0 6px #a855f7;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  /* Separator line between items — very subtle */
  .req-row::after{
    content:'';position:absolute;bottom:0;left:48px;right:0;
    height:1px;background:rgba(255,255,255,0.06);
  }
  .req-row:last-child::after{display:none;}
</style>
</head>
<body>
<div id="req-feed"></div>
<script>
const API='http://localhost:8000';
let state={recent_requests:[]};
let cfg={};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

/* Deterministic avatar color based on username */
const AVATAR_COLORS=[
  ['#f97316','#7c2d12'],['#a855f7','#3b0764'],['#22c55e','#14532d'],
  ['#3b82f6','#1e3a5f'],['#ec4899','#831843'],['#f59e0b','#78350f'],
  ['#06b6d4','#164e63'],['#8b5cf6','#2e1065']
];
function avatarColor(name){
  let h=0;for(const c of String(name))h=(h*31+c.charCodeAt(0))&0xffff;
  return AVATAR_COLORS[h%AVATAR_COLORS.length];
}
function initials(name){return String(name||'?').replace(/^@/,'').substring(0,2).toUpperCase();}

function applyConfig(c){
  cfg=c;
  const feed=document.getElementById('req-feed');
  feed.classList.toggle('hidden',c.show_request_feed===false);
  feed.classList.toggle('pos-left',c.position_queue==='left');
}

function render(){
  const feed=document.getElementById('req-feed');
  const items=(state.recent_requests||[]).slice(0,cfg.max_request_items||7);
  if(!items.length){feed.innerHTML='';return;}
  feed.innerHTML=items.map((r,i)=>{
    const isSkip=r.type==='skip';
    const sl=isSkip?'skip':(r.status||'queued');
    const [bg,fg]=avatarColor(r.user||'');
    const init=initials(r.user||'');
    const label=isSkip?`vote skip ⏭`:(r.song_title||r.text||'');
    return`<div class="req-row" style="animation-delay:${i*45}ms">
      <div class="req-avatar" style="background:${bg};color:${fg}">${esc(init)}</div>
      <div class="req-meta">
        <div class="req-user">@${esc(r.user||'')}</div>
        <div class="req-song">${esc(label)}</div>
      </div>
      <div class="req-dot ${esc(sl)}"></div>
    </div>`;
  }).join('');
}

function addRequest(data){
  state.recent_requests=state.recent_requests||[];
  const ex=state.recent_requests.find(r=>r.user===data.user&&r.text===data.query);
  if(ex){ex.status=data.status;if(data.song_title)ex.song_title=data.song_title;}
  else{state.recent_requests.unshift({type:'request',user:data.user,text:data.query,status:data.status,song_title:data.song_title});state.recent_requests=state.recent_requests.slice(0,20);}
  render();
}

function connectSSE(){
  const es=new EventSource(`${API}/overlay/events`);
  es.addEventListener('init',e=>{Object.assign(state,JSON.parse(e.data));render();});
  es.addEventListener('tiktok_request',e=>{addRequest(JSON.parse(e.data));});
  es.addEventListener('overlay_config',e=>{applyConfig(JSON.parse(e.data));});
  es.onerror=()=>{es.close();setTimeout(connectSSE,5000);};
}
async function init(){
  try{const r=await fetch(`${API}/overlay/config`);if(r.ok)applyConfig(await r.json());}catch(_){}
  try{const r=await fetch(`${API}/overlay/state`);if(r.ok){Object.assign(state,await r.json());render();}}catch(_){}
  connectSSE();setInterval(async()=>{try{const r=await fetch(`${API}/overlay/state`);if(r.ok){Object.assign(state,await r.json());render();}}catch(_){}},15000);
}
init();
</script>
</body>
</html>
