<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OBS – Queue</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1920px;height:1080px;overflow:hidden;background:transparent;
    font-family:'Outfit',sans-serif;color:#fff;-webkit-font-smoothing:antialiased}

  /* === QUEUE: horizontal ticker at the very bottom above now-playing === */
  #queue-wrap{
    position:fixed;bottom:96px;left:0;right:0;
    overflow:hidden;pointer-events:none;
    height:44px;
  }
  #queue-wrap.hidden{display:none;}

  /* Label on the left */
  #queue-label{
    position:absolute;left:0;top:0;bottom:0;z-index:2;
    display:flex;align-items:center;
    padding:0 18px 0 20px;
    background:linear-gradient(90deg,rgba(0,0,0,0.82) 70%,transparent 100%);
    gap:8px;
  }
  #queue-label-text{
    font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
    color:rgba(255,255,255,0.4);white-space:nowrap;
  }
  #queue-count{
    font-size:11px;font-weight:700;
    color:#f97316;
    font-variant-numeric:tabular-nums;
  }

  /* Fade-out on the right */
  #queue-fade{
    position:absolute;right:0;top:0;bottom:0;width:120px;z-index:2;
    background:linear-gradient(90deg,transparent,rgba(0,0,0,0.7) 100%);
    pointer-events:none;
  }

  /* The scrolling track */
  #queue-track{
    display:flex;align-items:center;height:44px;
    /* JS sets transform for smooth scroll */
    will-change:transform;
    white-space:nowrap;
    padding-left:160px;
  }

  /* Each song chip — floating pill with no background box */
  .q-chip{
    display:inline-flex;align-items:center;gap:10px;
    padding:0 28px 0 0;
    flex-shrink:0;
  }

  .q-num{
    font-size:10px;font-weight:700;color:rgba(249,115,22,0.7);
    font-variant-numeric:tabular-nums;
    min-width:18px;text-align:right;
  }

  .q-divider{
    width:1px;height:20px;background:rgba(255,255,255,0.15);flex-shrink:0;
  }

  .q-info{display:flex;flex-direction:column;gap:2px;}

  .q-title{
    font-size:14px;font-weight:600;color:#fff;
    white-space:nowrap;
    text-shadow:0 1px 8px rgba(0,0,0,0.9);
    max-width:260px;overflow:hidden;text-overflow:ellipsis;
  }

  .q-by{
    font-size:10px;font-weight:400;
    color:rgba(255,255,255,0.35);
    white-space:nowrap;
  }

  /* Dot separator between chips */
  .q-sep{
    width:4px;height:4px;border-radius:50%;
    background:rgba(255,255,255,0.15);
    flex-shrink:0;margin:0 16px 0 0;
  }

  /* Now playing mini – left side */
  #np-mini{
    position:fixed;bottom:96px;left:0;height:44px;
    display:flex;align-items:center;gap:10px;
    padding:0 16px 0 20px;z-index:10;
    background:linear-gradient(90deg,rgba(0,0,0,0.85) 85%,transparent);
  }
  #np-mini.hidden{display:none;}

  #np-mini-disc{
    width:28px;height:28px;border-radius:50%;flex-shrink:0;
    background:conic-gradient(from 0deg,#1a1030,#3b1f6b,#1a1030);
    border:1.5px solid rgba(168,85,247,0.6);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;
    animation:spin 4s linear infinite;
  }
  #np-mini-disc.paused{animation-play-state:paused;}
  @keyframes spin{to{transform:rotate(360deg);}}

  #np-mini-info{display:flex;flex-direction:column;gap:2px;}
  #np-mini-tag{font-size:8px;font-weight:700;letter-spacing:2px;color:rgba(249,115,22,0.7);text-transform:uppercase;}
  #np-mini-title{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;max-width:260px;overflow:hidden;text-overflow:ellipsis;}
</style>
</head>
<body>

<div id="np-mini" class="hidden">
  <div id="np-mini-disc">♪</div>
  <div id="np-mini-info">
    <div id="np-mini-tag">▶ Now Playing</div>
    <div id="np-mini-title">–</div>
  </div>
</div>

<div id="queue-wrap">
  <div id="queue-label">
    <span id="queue-label-text">Antrian</span>
    <span id="queue-count">0</span>
  </div>
  <div id="queue-fade"></div>
  <div id="queue-track"></div>
</div>

<script>
const API='http://localhost:8000';
let state={current_song:null,is_playing:false,is_paused:false,queue:[],queue_count:0};
let cfg={};
let scrollX=0,tickerW=0,animId=null,speed=0.55;
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function applyConfig(c){
  cfg=c;
  document.getElementById('queue-wrap').classList.toggle('hidden',c.show_queue===false);
  renderAll();
}

function renderAll(){renderNP();renderQueue();}

function renderNP(){
  const mini=document.getElementById('np-mini');
  const disc=document.getElementById('np-mini-disc');
  const title=document.getElementById('np-mini-title');
  const song=state.current_song;
  if(!song||!state.is_playing){mini.classList.add('hidden');return;}
  mini.classList.remove('hidden');
  title.textContent=song.title;
  disc.className=state.is_paused?'paused':'';
}

function renderQueue(){
  const track=document.getElementById('queue-track');
  const countEl=document.getElementById('queue-count');
  const items=state.queue||[];
  const count=state.queue_count||items.length;
  countEl.textContent=count;

  if(!items.length){track.innerHTML='';cancelAnimationFrame(animId);return;}

  const html=items.map((song,i)=>{
    const t=typeof song==='string'?song:(song.title||song?.song?.title||'?');
    const by=typeof song==='object'&&(song.requested_by||song?.song?.requested_by)||'';
    return`<div class="q-chip">
      <span class="q-num">${i+1}</span>
      <span class="q-divider"></span>
      <div class="q-info">
        <span class="q-title">${esc(t)}</span>
        ${by?`<span class="q-by">@${esc(by)}</span>`:''}
      </div>
    </div><div class="q-sep"></div>`;
  }).join('');

  /* Duplicate for seamless loop */
  track.innerHTML=html+html;
  tickerW=track.scrollWidth/2;
  cancelAnimationFrame(animId);
  scrollX=0;
  tick();
}

function tick(){
  scrollX-=speed;
  if(scrollX<=-tickerW) scrollX=0;
  document.getElementById('queue-track').style.transform=`translateX(${scrollX}px)`;
  animId=requestAnimationFrame(tick);
}

function connectSSE(){
  const es=new EventSource(`${API}/overlay/events`);
  es.addEventListener('init',e=>{Object.assign(state,JSON.parse(e.data));renderAll();});
  es.addEventListener('player_state',e=>{Object.assign(state,JSON.parse(e.data));renderAll();});
  es.addEventListener('player_stopped',()=>{state.current_song=null;state.is_playing=false;renderAll();});
  es.addEventListener('overlay_config',e=>{applyConfig(JSON.parse(e.data));});
  es.onerror=()=>{es.close();setTimeout(()=>{poll();setTimeout(connectSSE,5000);},2000);};
}
async function poll(){try{const r=await fetch(`${API}/overlay/state`);if(r.ok){Object.assign(state,await r.json());renderAll();}}catch(_){}}
async function init(){try{const r=await fetch(`${API}/overlay/config`);if(r.ok)applyConfig(await r.json());}catch(_){}connectSSE();setInterval(poll,10000);}
init();
</script>
</body>
</html>
