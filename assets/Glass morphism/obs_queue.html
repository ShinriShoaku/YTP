<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OBS – Queue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --accent:#f97316; --accent2:#a855f7; --border:rgba(249,115,22,0.2);
    --text:#f8fafc; --muted:#64748b; --opacity:0.88; --radius:16px;
    --shadow:0 16px 48px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
  }
  html, body {
    width:1920px; height:1080px; overflow:hidden; background:transparent;
    font-family:'Space Grotesk',sans-serif; color:var(--text);
    -webkit-font-smoothing:antialiased;
  }

  #queue-panel {
    position:fixed; top:20px; right:20px; width:330px;
    transition:right .3s, left .3s;
  }
  #queue-panel.pos-left { right:auto; left:20px; }
  #queue-panel.hidden { display:none; }

  /* ── MAIN CARD ── */
  .panel-card {
    background:rgba(6,6,16,var(--opacity));
    border:1px solid rgba(255,255,255,0.07);
    border-radius:var(--radius);
    overflow:hidden;
    backdrop-filter:blur(24px) saturate(180%);
    box-shadow:var(--shadow);
    /* Subtle inner glow */
    position:relative;
  }

  .panel-card::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent 0%, var(--accent) 40%, var(--accent2) 60%, transparent 100%);
    opacity:0.6;
  }

  /* ── HEADER ── */
  .panel-header {
    display:flex; align-items:center; gap:10px;
    padding:12px 16px 10px;
    font-size:9px; text-transform:uppercase; letter-spacing:2.5px;
    font-weight:700; color:rgba(255,255,255,0.5);
    font-family:'JetBrains Mono',monospace;
    border-bottom:1px solid rgba(255,255,255,.05);
  }

  .header-icon {
    width:22px; height:22px; border-radius:6px;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:11px;
    box-shadow:0 2px 8px rgba(249,115,22,0.4);
  }

  /* ── NOW PLAYING MINI ── */
  #np-mini {
    padding:10px 12px 8px;
    border-bottom:1px solid rgba(255,255,255,.05);
  }
  #np-mini-inner {
    display:flex; align-items:center; gap:10px;
    background:linear-gradient(135deg, rgba(249,115,22,.08), rgba(168,85,247,.06));
    border:1px solid rgba(249,115,22,.18);
    border-radius:10px; padding:8px 11px;
  }
  #np-mini-disc {
    width:32px; height:32px; border-radius:50%; flex-shrink:0;
    background:conic-gradient(from 0deg, #1a1a2e, #2d1b69, #1a1a2e);
    border:1.5px solid rgba(168,85,247,0.5);
    display:flex; align-items:center; justify-content:center;
    font-size:13px;
    animation:spin 5s linear infinite;
    box-shadow:0 0 12px rgba(168,85,247,0.3);
  }
  #np-mini-disc.paused { animation-play-state:paused; }
  @keyframes spin { to{transform:rotate(360deg);} }

  #np-mini-info { flex:1; min-width:0; }
  #np-mini-title { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #np-mini-sub { font-size:9px; color:var(--accent); font-weight:600; margin-top:2px;
    text-transform:uppercase; letter-spacing:1.5px; font-family:'JetBrains Mono',monospace; }
  #np-mini.hidden { display:none; }

  /* ── QUEUE LIST ── */
  #queue-list { padding:8px 12px 10px; }

  .q-row {
    display:flex; align-items:center; gap:10px;
    padding:7px 8px; border-radius:8px;
    margin-bottom:3px;
    transition:background .2s;
    animation:itemIn .35s cubic-bezier(.34,1.2,.64,1) both;
  }
  .q-row:hover { background:rgba(255,255,255,.03); }
  .q-row:last-child { margin-bottom:0; }

  @keyframes itemIn {
    from { opacity:0; transform:translateX(12px); }
    to   { opacity:1; transform:translateX(0); }
  }

  .q-num {
    font-size:10px; font-weight:800;
    color:var(--accent); width:16px; flex-shrink:0;
    text-align:center;
    font-family:'JetBrains Mono',monospace;
  }

  .q-bar {
    width:2px; height:28px; border-radius:2px; flex-shrink:0;
    background:linear-gradient(to bottom, var(--accent), transparent);
    opacity:0.3;
  }

  .q-info { flex:1; min-width:0; }
  .q-title {
    font-size:12px; font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    line-height:1.3;
  }
  .q-by {
    font-size:9px; color:rgba(249,115,22,0.7);
    font-family:'JetBrains Mono',monospace;
    margin-top:1px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .q-empty {
    font-size:12px; color:var(--muted); text-align:center;
    padding:16px 0; font-style:italic; letter-spacing:0.3px;
  }

  /* ── FOOTER ── */
  #queue-footer {
    padding:6px 12px 10px;
    border-top:1px solid rgba(255,255,255,.04);
  }
  #queue-total {
    font-size:9px; color:var(--muted); text-align:center;
    font-family:'JetBrains Mono',monospace; letter-spacing:0.5px;
  }
</style>
</head>
<body>
<div id="queue-panel">
  <div class="panel-card">
    <div class="panel-header">
      <div class="header-icon">📋</div>
      Antrian Lagu
    </div>
    <div id="np-mini" class="hidden">
      <div id="np-mini-inner">
        <div id="np-mini-disc">🎵</div>
        <div id="np-mini-info">
          <div id="np-mini-title">–</div>
          <div id="np-mini-sub">▶ Now Playing</div>
        </div>
      </div>
    </div>
    <div id="queue-list"><div class="q-empty">Antrian kosong</div></div>
    <div id="queue-footer"><div id="queue-total"></div></div>
  </div>
</div>
<script>
const API='http://localhost:8000';
let state={current_song:null,is_playing:false,is_paused:false,queue:[],queue_count:0};
let cfg={};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function applyConfig(c){
  cfg=c;
  document.documentElement.style.setProperty('--accent',c.accent_color||'#f97316');
  document.documentElement.style.setProperty('--accent2',c.accent_color2||'#a855f7');
  document.documentElement.style.setProperty('--border',hexAlpha(c.accent_color||'#f97316',0.2));
  document.documentElement.style.setProperty('--opacity',c.opacity_panels||0.88);
  toggle('queue-panel',c.show_queue!==false);
  const qp=document.getElementById('queue-panel');
  qp.classList.toggle('pos-left',c.position_queue==='left');
  renderAll();
}
function toggle(id,show,cls='hidden'){const el=document.getElementById(id);if(!el)return;show?el.classList.remove(cls):el.classList.add(cls);}
function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

function renderAll(){ renderNowPlayingMini(); renderQueue(); }

function renderNowPlayingMini(){
  const mini=document.getElementById('np-mini');
  const disc=document.getElementById('np-mini-disc');
  const titleEl=document.getElementById('np-mini-title');
  const song=state.current_song;
  if(!song||!state.is_playing){mini.classList.add('hidden');return;}
  mini.classList.remove('hidden');
  titleEl.textContent=song.title;
  disc.className=state.is_paused?'paused':'';
}

function renderQueue(){
  const list=document.getElementById('queue-list');
  const total=document.getElementById('queue-total');
  const items=state.queue||[];
  const limit=cfg.max_queue_items||6;
  const count=state.queue_count||items.length;
  if(!items.length){list.innerHTML='<div class="q-empty">Antrian kosong</div>';total.textContent='';return;}
  list.innerHTML=items.slice(0,limit).map((song,i)=>{
    const t=typeof song==='string'?song:(song.title||song?.song?.title||'?');
    const by=typeof song==='object'&&(song.requested_by||song?.song?.requested_by)||'';
    const delay=i*40;
    return`<div class="q-row" style="animation-delay:${delay}ms">
      <div class="q-num">${i+1}</div>
      <div class="q-bar"></div>
      <div class="q-info">
        <div class="q-title" title="${esc(t)}">${esc(t)}</div>
        ${by?`<div class="q-by">@${esc(by)}</div>`:''}
      </div>
    </div>`;
  }).join('');
  total.textContent=count>limit?`+${count-limit} lagu lagi`:'';
}

function connectSSE(){
  const es=new EventSource(`${API}/overlay/events`);
  es.addEventListener('init',e=>{Object.assign(state,JSON.parse(e.data));renderAll();});
  es.addEventListener('player_state',e=>{Object.assign(state,JSON.parse(e.data));renderAll();});
  es.addEventListener('player_stopped',()=>{state.current_song=null;state.is_playing=false;renderAll();});
  es.addEventListener('overlay_config',e=>{applyConfig(JSON.parse(e.data));});
  es.onerror=()=>{es.close();setTimeout(()=>{poll();setTimeout(connectSSE,5000);},2000);};
}
async function poll(){try{const r=await fetch(`${API}/overlay/state`);if(r.ok){Object.assign(state,await r.json());renderAll();}}catch(_){}}
async function init(){try{const r=await fetch(`${API}/overlay/config`);if(r.ok)applyConfig(await r.json());}catch(_){}connectSSE();setInterval(poll,10000);}
init();
</script>
</body>
</html>
