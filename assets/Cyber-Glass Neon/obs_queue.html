<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OBS – Queue</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent:#f97316; --accent2:#a855f7; --border:rgba(249,115,22,0.25);
  --text:#f8fafc; --muted:#94a3b8; --opacity:0.88; --radius:14px;
  --shadow:0 12px 40px rgba(0,0,0,0.65);
  --font:'Inter',system-ui,sans-serif;
  --spring:cubic-bezier(0.34,1.56,0.64,1);
}
html, body { width:1920px; height:1080px; overflow:hidden; background:transparent;
  font-family:var(--font); color:var(--text); }

#queue-panel { position:fixed; top:24px; right:24px; width:360px; z-index:50; transition:all .4s ease; }
#queue-panel.pos-left { right:auto; left:24px; }
#queue-panel.hidden { opacity:0; transform:translateX(30px); pointer-events:none; }

.panel-card {
  background:rgba(12,12,28,var(--opacity)); border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden; backdrop-filter:blur(20px) saturate(170%);
  box-shadow:var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.03);
  position:relative;
}
.panel-card::before { content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent); opacity:0.6; }
.panel-header { display:flex; align-items:center; gap:10px; padding:12px 16px;
  border-bottom:1px solid rgba(255,255,255,0.05); font-size:11px; text-transform:uppercase;
  letter-spacing:2px; font-weight:800; color:var(--accent); }

/* Now playing mini */
#np-mini { padding:10px 14px 8px; border-bottom:1px solid rgba(255,255,255,0.05); }
#np-mini.hidden { display:none; }
#np-mini-inner { display:flex; align-items:center; gap:10px;
  background:linear-gradient(135deg,rgba(249,115,22,0.12),rgba(168,85,247,0.08));
  border:1px solid rgba(249,115,22,0.25); border-radius:12px; padding:8px 12px; position:relative; overflow:hidden; }
#np-mini-inner::before { content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(249,115,22,0.06),transparent); animation:shine 3s infinite; }
@keyframes shine { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
#np-mini-icon { font-size:18px; flex-shrink:0; animation:spin 4s linear infinite; filter:drop-shadow(0 0 4px rgba(249,115,22,0.3)); }
#np-mini-icon.paused { animation-play-state:paused; filter:grayscale(0.6); }
@keyframes spin { to{transform:rotate(360deg)} }
#np-mini-title { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#np-mini-sub { font-size:10px; color:#fb923c; margin-top:2px; font-weight:600; letter-spacing:0.5px; }

#queue-list { padding:10px 14px 12px; }
.q-row { display:flex; align-items:center; gap:12px; padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,0.04); animation:queueSlide .4s ease both;
  transition:all .2s ease; }
.q-row:hover { transform:translateX(4px); }
.q-row:last-child { border-bottom:none; }
.q-num { width:26px; height:26px; border-radius:8px; flex-shrink:0;
  background:linear-gradient(135deg,rgba(249,115,22,0.2),rgba(168,85,247,0.15));
  border:1px solid rgba(249,115,22,0.3); display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:800; color:var(--accent); box-shadow:0 0 8px rgba(249,115,22,0.15); }
.q-title { font-size:13px; font-weight:600; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-0.2px; }
.q-by { font-size:10px; color:var(--muted); flex-shrink:0; max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  background:rgba(255,255,255,0.05); padding:2px 8px; border-radius:10px; }
.q-empty { font-size:13px; color:var(--muted); text-align:center; padding:20px 0; font-style:italic;
  display:flex; align-items:center; justify-content:center; gap:8px; }
.q-empty::before { content:'🎵'; opacity:0.5; animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

@keyframes queueSlide { from{opacity:0;transform:translateX(20px) scale(0.98)} to{opacity:1;transform:translateX(0) scale(1)} }

#queue-footer { padding:8px 14px 10px; border-top:1px solid rgba(255,255,255,0.05); }
#queue-total { font-size:10px; color:var(--muted); text-align:center; font-weight:500; letter-spacing:0.5px; }
</style>
</head>
<body>
<div id="queue-panel">
  <div class="panel-card">
    <div class="panel-header">📋 Antrian</div>
    <div id="np-mini" class="hidden">
      <div id="np-mini-inner">
        <div id="np-mini-icon">🎵</div>
        <div><div id="np-mini-title">–</div><div id="np-mini-sub">Now Playing</div></div>
      </div>
    </div>
    <div id="queue-list"><div class="q-empty">Antrian kosong</div></div>
    <div id="queue-footer"><div id="queue-total"></div></div>
  </div>
</div>
<script>
const API='http://localhost:8000';
let state={current_song:null,is_playing:false,is_paused:false,queue:[],queue_count:0};
let cfg={};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function applyConfig(c){
  cfg=c;
  document.documentElement.style.setProperty('--accent',c.accent_color||'#f97316');
  document.documentElement.style.setProperty('--accent2',c.accent_color2||'#a855f7');
  document.documentElement.style.setProperty('--border',hexAlpha(c.accent_color||'#f97316',0.25));
  document.documentElement.style.setProperty('--opacity',c.opacity_panels||0.88);
  toggle('queue-panel',c.show_queue!==false);
  const qp=document.getElementById('queue-panel');
  qp.classList.toggle('pos-left',c.position_queue==='left');
  renderAll();
}
function toggle(id,show,cls='hidden'){const el=document.getElementById(id);if(!el)return;show?el.classList.remove(cls):el.classList.add(cls);}
function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

function renderAll(){renderNowPlayingMini();renderQueue();}

function renderNowPlayingMini(){
  const mini=document.getElementById('np-mini'),icon=document.getElementById('np-mini-icon'),titleEl=document.getElementById('np-mini-title');
  const song=state.current_song;
  if(!song||!state.is_playing){mini.classList.add('hidden');return;}
  mini.classList.remove('hidden'); titleEl.textContent=song.title;
  icon.className=state.is_paused?'paused':'';
}

function renderQueue(){
  const list=document.getElementById('queue-list'),total=document.getElementById('queue-total');
  const items=state.queue||[],limit=cfg.max_queue_items||6,count=state.queue_count||items.length;
  if(!items.length){list.innerHTML='<div class="q-empty">Antrian kosong</div>';total.textContent='';return;}
  list.innerHTML=items.slice(0,limit).map((song,i)=>{
    const t=typeof song==='string'?song:(song.title||song?.song?.title||'?');
    const by=typeof song==='object'&&(song.requested_by||song?.song?.requested_by)||'';
    return`<div class="q-row" style="animation-delay:${i*0.05}s"><div class="q-num">${i+1}</div><div class="q-title" title="${esc(t)}">${esc(t)}</div>${by?`<div class="q-by">@${esc(by)}</div>`:''}</div>`;
  }).join('');
  total.textContent=count>limit?`+${count-limit} lagu lagi dalam antrian`:'';
}

function connectSSE(){
  const es=new EventSource(`${API}/overlay/events`);
  es.addEventListener('init',e=>{Object.assign(state,JSON.parse(e.data));renderAll();});
  es.addEventListener('player_state',e=>{Object.assign(state,JSON.parse(e.data));renderAll();});
  es.addEventListener('player_stopped',()=>{state.current_song=null;state.is_playing=false;renderAll();});
  es.addEventListener('overlay_config',e=>{applyConfig(JSON.parse(e.data));});
  es.onerror=()=>{es.close();setTimeout(()=>{poll();setTimeout(connectSSE,5000);},2000);};
}
async function poll(){try{const r=await fetch(`${API}/overlay/state`);if(r.ok){Object.assign(state,await r.json());renderAll();}}catch(_){}}
async function init(){try{const r=await fetch(`${API}/overlay/config`);if(r.ok)applyConfig(await r.json());}catch(_){}connectSSE();setInterval(poll,10000);}
init();
</script>
</body>
</html>
