<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920,height=1080" />
<title>OBS Subtitle Overlay</title>

<style>
  *,
  *::before,
  *::after{
    box-sizing:border-box;
    margin:0;
    padding:0;
  }

  :root{
    --accent:#f97316;
    --accent2:#a855f7;
    --text:#f8fafc;

    --subtitle-size:34px;
    --subtitle-width:1500px;

    --pill-bg:rgba(6,6,16,0.84);
    --pill-border:rgba(249,115,22,0.25);
  }

  html,
  body{
    width:1920px;
    height:1080px;
    overflow:hidden;
    background:transparent;
    font-family:'Segoe UI',system-ui,sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }

  /* ───────────────────────────────────────── */
  /* WRAP                                     */
  /* ───────────────────────────────────────── */

  #subtitle-wrap{
    position:fixed;
    left:50%;
    bottom:92px;
    transform:translateX(-50%);
    width:min(var(--subtitle-width),92vw);

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;

    z-index:9999;
    pointer-events:none;
  }

  #subtitle-wrap.hidden{
    display:none !important;
  }

  /* ───────────────────────────────────────── */
  /* PILL                                     */
  /* ───────────────────────────────────────── */

  #sub-pill{
    position:relative;

    width:100%;
    min-height:70px;

    padding:
      18px
      42px
      20px;

    border-radius:34px;

    background:var(--pill-bg);
    border:1px solid var(--pill-border);

    backdrop-filter:blur(18px) saturate(170%);

    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03) inset,
      0 18px 60px rgba(0,0,0,0.65),
      0 0 120px rgba(249,115,22,0.06);

    overflow:hidden;
  }

  #sub-pill::before{
    content:'';

    position:absolute;
    left:8%;
    right:8%;
    top:0;

    height:1px;

    background:
      linear-gradient(
        90deg,
        transparent 0%,
        rgba(249,115,22,0.8) 25%,
        rgba(168,85,247,0.7) 75%,
        transparent 100%
      );
  }

  #sub-pill::after{
    content:'';

    position:absolute;
    left:20%;
    right:20%;
    bottom:-24px;

    height:30px;

    background:
      radial-gradient(
        ellipse,
        rgba(249,115,22,0.18) 0%,
        transparent 75%
      );

    filter:blur(10px);
  }

  /* ───────────────────────────────────────── */
  /* TEXT                                     */
  /* ───────────────────────────────────────── */

  #sub-text{
    position:relative;
    z-index:2;

    width:100%;

    font-size:var(--subtitle-size);
    font-weight:800;
    line-height:1.45;
    letter-spacing:0.3px;

    text-align:center;

    white-space:normal;
    overflow-wrap:break-word;
    word-break:break-word;

    text-shadow:
      0 2px 10px rgba(0,0,0,1),
      0 0 20px rgba(0,0,0,0.65);
  }

  /* karaoke word */
  .sw{
    display:inline;
    color:rgba(241,245,249,0.45);

    transition:
      color .08s ease,
      text-shadow .08s ease,
      opacity .08s ease;
  }

  .sw.done{
    color:rgba(241,245,249,0.28);
  }

  .sw.active{
    color:#ffffff;

    text-shadow:
      0 0 16px rgba(249,115,22,1),
      0 0 28px rgba(249,115,22,0.85),
      0 0 52px rgba(249,115,22,0.35);

    animation:wordPop .12s cubic-bezier(.34,1.56,.64,1) both;
  }

  /* plain subtitle */
  #sub-text.plain .sw{
    color:var(--text);
    opacity:1;

    text-shadow:
      0 2px 12px rgba(0,0,0,.9);
  }

  /* ───────────────────────────────────────── */
  /* PROGRESS                                 */
  /* ───────────────────────────────────────── */

  #sub-progress{
    width:min(700px,70%);
    height:3px;

    border-radius:999px;
    overflow:hidden;

    background:rgba(255,255,255,0.08);
  }

  #sub-progress.hidden{
    display:none;
  }

  #sub-progress-bar{
    width:0%;
    height:100%;

    background:
      linear-gradient(
        90deg,
        var(--accent),
        var(--accent2)
      );

    box-shadow:
      0 0 10px rgba(249,115,22,.9);
  }

  /* ───────────────────────────────────────── */
  /* HINT                                     */
  /* ───────────────────────────────────────── */

  #sub-hint{
    font-size:11px;
    font-weight:700;
    letter-spacing:1.6px;
    text-transform:uppercase;

    color:rgba(148,163,184,0.65);

    display:none;
  }

  #sub-hint.visible{
    display:block;
  }

  /* ───────────────────────────────────────── */
  /* ANIMATION                                */
  /* ───────────────────────────────────────── */

  @keyframes wordPop{
    from{
      transform:scale(.86);
    }
    to{
      transform:scale(1);
    }
  }

  @keyframes pillIn{
    0%{
      opacity:0;
      transform:translateY(26px) scale(.96);
    }
    60%{
      opacity:1;
      transform:translateY(-2px) scale(1.01);
    }
    100%{
      opacity:1;
      transform:translateY(0) scale(1);
    }
  }

  @keyframes pillOut{
    from{
      opacity:1;
      transform:translateY(0) scale(1);
    }
    to{
      opacity:0;
      transform:translateY(-18px) scale(.96);
    }
  }

  @keyframes glowPulse{
    0%,100%{
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 18px 60px rgba(0,0,0,.65),
        0 0 120px rgba(249,115,22,.06);
    }

    50%{
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 18px 60px rgba(0,0,0,.65),
        0 0 120px rgba(249,115,22,.2),
        0 0 40px rgba(249,115,22,.12);
    }
  }

  #sub-pill.entering{
    animation:pillIn .42s cubic-bezier(.34,1.56,.64,1) both;
  }

  #sub-pill.leaving{
    animation:pillOut .24s ease both;
  }

  #sub-pill.glowing{
    animation:glowPulse 1.8s ease-in-out infinite;
  }

  /* ───────────────────────────────────────── */
  /* RESPONSIVE SAFETY                        */
  /* ───────────────────────────────────────── */

  @media (max-width:1600px){
    :root{
      --subtitle-size:30px;
      --subtitle-width:1300px;
    }
  }

  @media (max-width:1200px){
    :root{
      --subtitle-size:26px;
      --subtitle-width:1100px;
    }
  }
</style>
</head>

<body>

<div id="subtitle-wrap" class="hidden">

  <div id="sub-pill">
    <div id="sub-text"></div>
  </div>

  <div id="sub-progress" class="hidden">
    <div id="sub-progress-bar"></div>
  </div>

  <div id="sub-hint"></div>

</div>

<script>
const API = 'http://localhost:8000';

let cfg = {};
let visible = false;

let hideTimer = null;
let karaokeTimers = [];

const esc = s =>
  String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');

/* ───────────────────────────────────────── */
/* CONFIG                                   */
/* ───────────────────────────────────────── */

function applyConfig(c){
  cfg = c || {};

  document.documentElement.style.setProperty(
    '--accent',
    c.accent_color || '#f97316'
  );

  document.documentElement.style.setProperty(
    '--accent2',
    c.accent_color2 || '#a855f7'
  );

  document.documentElement.style.setProperty(
    '--subtitle-size',
    (c.subtitle_font_size || 34) + 'px'
  );

  if(c.show_subtitle === false){
    clearSubtitle(true);
    document.getElementById('subtitle-wrap')
      .classList.add('hidden');
  }
}

/* ───────────────────────────────────────── */
/* SHOW SUBTITLE                            */
/* ───────────────────────────────────────── */

function showSubtitle(text, words, durationMs, songHint){

  if(cfg.show_subtitle === false) return;
  if(!text || !text.trim()) return;

  clearAllTimers();

  const wrap    = document.getElementById('subtitle-wrap');
  const pill    = document.getElementById('sub-pill');
  const textEl  = document.getElementById('sub-text');
  const hintEl  = document.getElementById('sub-hint');

  const prog    = document.getElementById('sub-progress');
  const progBar = document.getElementById('sub-progress-bar');

  /* hint */

  if(songHint){
    hintEl.textContent = songHint;
    hintEl.classList.add('visible');
  }else{
    hintEl.classList.remove('visible');
  }

  const render = () => {

    /* karaoke */

    if(words && Array.isArray(words) && words.length > 0){

      textEl.className = '';

      textEl.innerHTML = words.map((w, i) => {
        return `<span class="sw" id="sw${i}">${esc(w.word)}</span>`;
      }).join(' ');

      pill.classList.add('glowing');

      words.forEach((w, i) => {

        if(w.start == null) return;

        const t1 = setTimeout(() => {

          const current = document.getElementById(`sw${i}`);

          if(current){
            current.classList.remove('done');
            current.classList.add('active');
          }

          if(i > 0){
            const prev = document.getElementById(`sw${i-1}`);

            if(prev){
              prev.classList.remove('active');
              prev.classList.add('done');
            }
          }

        }, w.start * 1000);

        karaokeTimers.push(t1);

        if(w.end != null){

          const t2 = setTimeout(() => {

            const current = document.getElementById(`sw${i}`);

            if(current){
              current.classList.remove('active');
              current.classList.add('done');
            }

          }, w.end * 1000);

          karaokeTimers.push(t2);
        }
      });

    }else{

      /* plain mode */

      textEl.className = 'plain';

      textEl.innerHTML = text
        .split(' ')
        .map(w => `<span class="sw active">${esc(w)}</span>`)
        .join(' ');

      pill.classList.remove('glowing');
    }

    /* progress */

    if(durationMs > 0){

      prog.classList.remove('hidden');

      progBar.style.transition = 'none';
      progBar.style.width = '0%';

      void progBar.offsetWidth;

      progBar.style.transition =
        `width ${durationMs}ms linear`;

      progBar.style.width = '100%';

    }else{

      prog.classList.add('hidden');
    }

    /* show */

    wrap.classList.remove('hidden');

    pill.classList.remove(
      'entering',
      'leaving'
    );

    void pill.offsetWidth;

    pill.classList.add('entering');

    pill.addEventListener(
      'animationend',
      () => pill.classList.remove('entering'),
      { once:true }
    );

    visible = true;

    hideTimer = setTimeout(() => {
      clearSubtitle(false);
    }, durationMs || 4500);
  };

  if(visible){

    pill.classList.remove('entering');

    pill.classList.add('leaving');

    pill.addEventListener('animationend', () => {

      pill.classList.remove('leaving');

      visible = false;

      render();

    }, { once:true });

  }else{
    render();
  }
}

/* ───────────────────────────────────────── */
/* CLEAR                                    */
/* ───────────────────────────────────────── */

function clearAllTimers(){

  if(hideTimer){
    clearTimeout(hideTimer);
    hideTimer = null;
  }

  karaokeTimers.forEach(t => clearTimeout(t));
  karaokeTimers = [];
}

function clearSubtitle(instant){

  clearAllTimers();

  const wrap = document.getElementById('subtitle-wrap');
  const pill = document.getElementById('sub-pill');

  const progBar =
    document.getElementById('sub-progress-bar');

  progBar.style.width = '0%';

  if(instant || !visible){

    wrap.classList.add('hidden');

    pill.classList.remove(
      'glowing',
      'entering',
      'leaving'
    );

    visible = false;

    return;
  }

  pill.classList.remove(
    'entering',
    'glowing'
  );

  pill.classList.add('leaving');

  pill.addEventListener('animationend', () => {

    wrap.classList.add('hidden');

    pill.classList.remove('leaving');

    visible = false;

  }, { once:true });
}

/* ───────────────────────────────────────── */
/* SSE                                      */
/* ───────────────────────────────────────── */

function connectSSE(){

  const es = new EventSource(
    `${API}/overlay/events`
  );

  es.addEventListener('subtitle', e => {

    const d = JSON.parse(e.data);

    showSubtitle(
      d.text,
      d.words || null,
      d.duration_ms || 4500,
      d.song_hint || null
    );
  });

  es.addEventListener(
    'subtitle_clear',
    () => clearSubtitle(false)
  );

  es.addEventListener(
    'player_stopped',
    () => clearSubtitle(false)
  );

  es.addEventListener('overlay_config', e => {
    applyConfig(JSON.parse(e.data));
  });

  es.onerror = () => {
    es.close();
    setTimeout(connectSSE, 5000);
  };
}

/* ───────────────────────────────────────── */
/* INIT                                     */
/* ───────────────────────────────────────── */

async function init(){

  try{

    const r = await fetch(
      `${API}/overlay/config`
    );

    if(r.ok){
      applyConfig(await r.json());
    }

  }catch(err){}

  connectSSE();
}

init();
</script>

</body>
</html>
