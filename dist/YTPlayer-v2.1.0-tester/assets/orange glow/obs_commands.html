<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OBS – Commands</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1920px;height:1080px;overflow:hidden;background:transparent;
    font-family:'Outfit',sans-serif;color:#fff;-webkit-font-smoothing:antialiased}

  /* Minimal floating text block — bottom-left */
  #cmd-wrap{
    position:fixed;bottom:24px;left:24px;
    display:flex;flex-direction:column;gap:10px;
    pointer-events:none;
  }
  #cmd-wrap.pos-right{left:auto;right:24px;}
  #cmd-wrap.hidden{display:none;}

  /* Tiktok status — just a small indicator line */
  #tiktok-line{
    display:flex;align-items:center;gap:8px;
    margin-bottom:4px;
  }
  #tiktok-dot{
    width:6px;height:6px;border-radius:50%;
    background:#ef4444;flex-shrink:0;
    transition:all .4s;
  }
  #tiktok-dot.live{
    background:#22c55e;
    box-shadow:0 0 0 3px rgba(34,197,94,.2);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.2);}50%{box-shadow:0 0 0 6px rgba(34,197,94,.08);}}
  #tiktok-text{
    font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
    color:rgba(255,255,255,0.3);
  }
  #tiktok-text.live{color:rgba(34,197,94,0.7);}

  /* Each command row */
  .cmd-line{
    display:flex;align-items:baseline;gap:10px;
    animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  /* The command keyword */
  .cmd-key{
    font-family:'JetBrains Mono',monospace;
    font-size:13px;font-weight:600;
    color:#f97316;
    letter-spacing:0;
    text-shadow:0 0 20px rgba(249,115,22,0.5);
  }

  /* The description — very light */
  .cmd-val{
    font-size:13px;font-weight:400;
    color:rgba(255,255,255,0.4);
    letter-spacing:0.2px;
  }
</style>
</head>
<body>
<div id="cmd-wrap">
  <div id="tiktok-line">
    <div id="tiktok-dot"></div>
    <span id="tiktok-text">TikTok Offline</span>
  </div>
  <div id="cmd-rows"></div>
</div>
<script>
const API='http://localhost:8000';
let cfg={};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function applyConfig(c){
  cfg=c;
  const w=document.getElementById('cmd-wrap');
  if(c.position_commands==='hidden'){w.classList.add('hidden');return;}
  w.classList.remove('hidden');
  w.classList.toggle('pos-right',c.position_commands==='right');
}

function renderCommands(cmds){
  const rows=document.getElementById('cmd-rows');
  const entries=[
    {key:'request',desc:'request lagu'},
    {key:'skip',desc:'vote skip'},
    {key:'queue',desc:'lihat antrian'},
  ];
  rows.innerHTML=entries.map((e,i)=>{
    const list=cmds[e.key]||[];
    if(!list.length)return'';
    return`<div class="cmd-line" style="animation-delay:${i*60}ms">
      <span class="cmd-key">${esc(list[0])}</span>
      <span class="cmd-val">${esc(e.desc)}</span>
    </div>`;
  }).join('');
}

function updateTikTok(connected){
  const dot=document.getElementById('tiktok-dot');
  const txt=document.getElementById('tiktok-text');
  dot.className=connected?'live':'';
  txt.className=connected?'live':'';
  txt.textContent=connected?'TikTok Live':'TikTok Offline';
}

function connectSSE(){
  const es=new EventSource(`${API}/overlay/events`);
  es.addEventListener('init',e=>{const d=JSON.parse(e.data);if(d.commands)renderCommands(d.commands);updateTikTok(!!d.tiktok_connected);});
  es.addEventListener('tiktok_status',e=>{updateTikTok(JSON.parse(e.data).connected);});
  es.addEventListener('overlay_config',e=>{applyConfig(JSON.parse(e.data));});
  es.onerror=()=>{es.close();setTimeout(connectSSE,5000);};
}
async function init(){
  try{const r=await fetch(`${API}/overlay/config`);if(r.ok)applyConfig(await r.json());}catch(_){}
  try{const r=await fetch(`${API}/overlay/state`);if(r.ok){const d=await r.json();if(d.commands)renderCommands(d.commands);updateTikTok(!!d.tiktok_connected);}}catch(_){}
  connectSSE();
}
init();
</script>
</body>
</html>
