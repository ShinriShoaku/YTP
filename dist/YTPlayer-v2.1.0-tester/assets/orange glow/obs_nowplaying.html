<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OBS – Now Playing</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1920px;height:1080px;overflow:hidden;background:transparent;
    font-family:'Outfit',sans-serif;color:#fff;-webkit-font-smoothing:antialiased}

  /* === NOW PLAYING: top bar — thin & clean === */
  #now-playing{
    position:fixed;top:0;left:0;right:0;height:72px;
    background:rgba(4,4,12,0.92);
    border-bottom:1px solid rgba(255,255,255,0.06);
    display:flex;align-items:center;
    padding:0 32px;gap:20px;
    backdrop-filter:blur(20px);
    overflow:hidden;
    transition:opacity .4s;
  }
  #now-playing.hidden{display:none;}
  #now-playing.idle{opacity:0.6;}

  /* Thin accent line at bottom */
  #now-playing::after{
    content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,
      transparent 0%,
      #f97316 var(--progress,0%),
      rgba(249,115,22,0.15) var(--progress,0%),
      rgba(249,115,22,0.15) 100%
    );
    transition:--progress 1s linear;
  }

  /* Thumbnail — small square, left side */
  #np-thumb{
    width:44px;height:44px;border-radius:6px;object-fit:cover;
    flex-shrink:0;border:1px solid rgba(255,255,255,0.1);
    display:none;
  }
  #np-thumb.show{display:block;}

  /* Waveform bars — animated, shows when playing */
  #np-wave{
    display:flex;align-items:flex-end;gap:2.5px;
    height:28px;flex-shrink:0;width:22px;
  }
  #np-wave span{
    display:block;width:3px;border-radius:2px;
    background:#f97316;opacity:0.9;
    animation:bar 0.6s ease-in-out infinite alternate;
    transform-origin:bottom;
  }
  #np-wave span:nth-child(1){animation-duration:.5s;animation-delay:0s;}
  #np-wave span:nth-child(2){animation-duration:.7s;animation-delay:.07s;}
  #np-wave span:nth-child(3){animation-duration:.45s;animation-delay:.14s;}
  #np-wave span:nth-child(4){animation-duration:.65s;animation-delay:.05s;}
  #np-wave span:nth-child(5){animation-duration:.55s;animation-delay:.1s;}
  @keyframes bar{from{height:4px;opacity:.5;}to{height:24px;opacity:1;}}
  #np-wave.paused span{animation-play-state:paused;}
  #np-wave.idle{opacity:0.3;}

  /* Song info */
  #np-info{flex:1;min-width:0;display:flex;align-items:baseline;gap:12px;}

  #np-title{
    font-size:19px;font-weight:700;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    color:#fff;letter-spacing:-0.2px;
    max-width:700px;
  }
  #np-title.idle{font-size:15px;font-weight:400;color:rgba(255,255,255,0.35);}

  #np-channel{
    font-size:13px;font-weight:400;color:rgba(255,255,255,0.4);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;
  }
  #np-channel.hidden{display:none;}

  /* Requester tag — small badge inline */
  #np-req{
    font-size:11px;font-weight:600;
    color:rgba(249,115,22,0.8);
    font-family:'JetBrains Mono',monospace;
    white-space:nowrap;flex-shrink:0;
  }
  #np-req.hidden{display:none;}

  /* Right side */
  #np-right{
    display:flex;align-items:center;gap:20px;flex-shrink:0;
  }

  /* Timer */
  #np-timer{
    font-size:12px;font-weight:500;
    color:rgba(255,255,255,0.35);
    font-family:'JetBrains Mono',monospace;
    letter-spacing:0.5px;
  }
  #np-timer.hidden{display:none;}

  /* Queue count */
  #np-qcount{
    font-size:11px;font-weight:600;
    color:rgba(255,255,255,0.3);
    letter-spacing:0.5px;
  }

  /* TikTok dot */
  #tk-dot{width:7px;height:7px;border-radius:50%;background:#ef4444;flex-shrink:0;transition:all .3s;}
  #tk-dot.live{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.6);animation:pdot 2s infinite;}
  #tk-dot.off{display:none;}
  @keyframes pdot{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* Skip vote bar */
  #skip-wrap{display:flex;align-items:center;gap:6px;opacity:0;transition:opacity .3s;}
  #skip-wrap.show{opacity:1;}
  #skip-wrap.hidden{display:none!important;}
  .sdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .2s;}
  .sdot.on{background:#facc15;box-shadow:0 0 4px #facc15;}
  #skip-lbl{font-size:10px;color:rgba(255,255,255,.35);font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
<div id="now-playing" class="idle">
  <img id="np-thumb" alt="">
  <div id="np-wave" class="idle">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div id="np-info">
    <div id="np-title" class="idle">Menunggu lagu…</div>
    <div id="np-channel" class="hidden"></div>
    <div id="np-req" class="hidden"></div>
  </div>
  <div id="np-right">
    <div id="skip-wrap" class="hidden">
      <span id="skip-lbl">skip</span>
      <div id="skip-dots" style="display:flex;gap:3px;"></div>
      <span id="skip-count" style="font-size:10px;color:rgba(255,255,255,.35);font-family:'JetBrains Mono',monospace;"></span>
    </div>
    <div id="np-timer" class="hidden">0:00</div>
    <div id="np-qcount">0 antrian</div>
    <div id="tk-dot"></div>
  </div>
</div>
<script>
const API='http://localhost:8000';
let state={current_song:null,is_playing:false,is_paused:false,queue_count:0,tiktok_connected:false,skip_votes:0,skip_threshold:5,elapsed_ms:0};
let cfg={};
let songStartedAt=0,songDurationMs=0,progressTimer=null;
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt=s=>{const m=Math.floor(s/60),sc=Math.floor(s%60);return`${m}:${String(sc).padStart(2,'0')}`;};

function applyConfig(c){
  cfg=c;
  const el=document.getElementById('now-playing');
  el.classList.toggle('hidden',c.show_now_playing===false);
  const sk=document.getElementById('skip-wrap');
  c.show_skip_vote!==false?sk.classList.remove('hidden'):sk.classList.add('hidden');
  const dot=document.getElementById('tk-dot');
  c.show_tiktok_dot===false?dot.classList.add('off'):dot.classList.remove('off');
  render();
}

function setProgress(pct){
  document.getElementById('now-playing').style.setProperty('--progress',pct+'%');
}

function render(){
  const song=state.current_song;
  const titleEl=document.getElementById('np-title');
  const chanEl=document.getElementById('np-channel');
  const reqEl=document.getElementById('np-req');
  const thumb=document.getElementById('np-thumb');
  const wave=document.getElementById('np-wave');
  const np=document.getElementById('now-playing');
  const timer=document.getElementById('np-timer');

  document.getElementById('np-qcount').textContent=`${state.queue_count||0} antrian`;

  if(!song||!state.is_playing){
    titleEl.textContent='Menunggu lagu…';titleEl.className='idle';
    chanEl.classList.add('hidden');reqEl.classList.add('hidden');
    thumb.classList.remove('show');wave.className='idle';
    np.classList.add('idle');timer.classList.add('hidden');
    setProgress(0);stopProgress();return;
  }

  np.classList.remove('idle');
  titleEl.textContent=song.title;titleEl.className='';

  if(cfg.show_channel!==false&&song.channel){chanEl.textContent=song.channel;chanEl.classList.remove('hidden');}
  else chanEl.classList.add('hidden');

  if(song.requested_by&&cfg.show_requester!==false){reqEl.textContent='@'+song.requested_by;reqEl.classList.remove('hidden');}
  else reqEl.classList.add('hidden');

  if(song.thumbnail&&cfg.show_thumbnail!==false){thumb.src=song.thumbnail;thumb.classList.add('show');}
  else thumb.classList.remove('show');

  wave.className=state.is_paused?'paused':'';

  if(state.is_playing&&!state.is_paused){
    if(song.duration)timer.classList.remove('hidden');
    songStartedAt=Date.now()-(state.elapsed_ms||0);
    songDurationMs=(song.duration||0)*1000;
    startProgress();
  }else stopProgress();
}

function startProgress(){
  stopProgress();
  if(!songDurationMs)return;
  const timer=document.getElementById('np-timer');
  const song=state.current_song;
  progressTimer=setInterval(()=>{
    const elapsed=Date.now()-songStartedAt;
    const pct=Math.min(100,(elapsed/songDurationMs)*100);
    if(cfg.show_progress_bar!==false)setProgress(pct);
    if(song&&song.duration)timer.textContent=`${fmt(elapsed/1000)} / ${fmt(song.duration)}`;
    if(pct>=100)stopProgress();
  },500);
}
function stopProgress(){if(progressTimer){clearInterval(progressTimer);progressTimer=null;}setProgress(0);}

function updateSkipVote(){
  const wrap=document.getElementById('skip-wrap');
  const dots=document.getElementById('skip-dots');
  const count=document.getElementById('skip-count');
  const v=state.skip_votes||0,t=state.skip_threshold||5;
  count.textContent=`${v}/${t}`;
  dots.innerHTML=Array.from({length:t},(_,i)=>`<div class="sdot${i<v?' on':''}"></div>`).join('');
  if(cfg.show_skip_vote!==false){wrap.classList.toggle('show',v>0);}
}

function updateTikTok(){
  const d=document.getElementById('tk-dot');
  if(cfg.show_tiktok_dot===false){d.classList.add('off');return;}
  d.classList.remove('off');
  d.classList.toggle('live',!!state.tiktok_connected);
}

function connectSSE(){
  const es=new EventSource(`${API}/overlay/events`);
  es.addEventListener('init',e=>{Object.assign(state,JSON.parse(e.data));render();updateSkipVote();updateTikTok();});
  es.addEventListener('player_state',e=>{Object.assign(state,JSON.parse(e.data));render();});
  es.addEventListener('skip_vote',e=>{const d=JSON.parse(e.data);state.skip_votes=d.votes;state.skip_threshold=d.threshold;updateSkipVote();});
  es.addEventListener('skip_executed',()=>{state.skip_votes=0;updateSkipVote();});
  es.addEventListener('tiktok_status',e=>{state.tiktok_connected=JSON.parse(e.data).connected;updateTikTok();});
  es.addEventListener('player_stopped',()=>{state.current_song=null;state.is_playing=false;state.skip_votes=0;render();updateSkipVote();});
  es.addEventListener('overlay_config',e=>{applyConfig(JSON.parse(e.data));});
  es.onerror=()=>{es.close();setTimeout(()=>{poll();setTimeout(connectSSE,5000);},2000);};
}
async function poll(){try{const r=await fetch(`${API}/overlay/state`);if(r.ok){Object.assign(state,await r.json());render();}}catch(_){}}
async function init(){try{const r=await fetch(`${API}/overlay/config`);if(r.ok)applyConfig(await r.json());}catch(_){}connectSSE();setInterval(poll,10000);}
init();
</script>
</body>
</html>
