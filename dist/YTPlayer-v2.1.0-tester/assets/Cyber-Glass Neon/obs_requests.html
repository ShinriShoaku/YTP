<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OBS – Requests</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent:#f97316; --accent2:#a855f7; --border:rgba(249,115,22,0.25);
  --green:#22c55e; --red:#ef4444; --yellow:#facc15;
  --text:#f8fafc; --muted:#94a3b8; --opacity:0.88; --radius:14px;
  --shadow:0 12px 40px rgba(0,0,0,0.65);
  --font:'Inter',system-ui,sans-serif;
}
html, body { width:1920px; height:1080px; overflow:hidden; background:transparent;
  font-family:var(--font); color:var(--text); }

#req-panel { position:fixed; top:24px; right:24px; width:340px; z-index:50; transition:all .4s ease; }
#req-panel.pos-left { right:auto; left:24px; }
#req-panel.hidden { opacity:0; transform:translateX(30px); pointer-events:none; }

.panel-card {
  background:rgba(12,12,28,var(--opacity)); border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden; backdrop-filter:blur(20px) saturate(170%);
  box-shadow:var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.03);
  position:relative;
}
.panel-card::before { content:''; position:absolute; top:0; left:10%; right:10%; height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent); opacity:0.6; }
.panel-header { display:flex; align-items:center; gap:10px; padding:12px 16px;
  border-bottom:1px solid rgba(255,255,255,0.05); font-size:11px; text-transform:uppercase;
  letter-spacing:2px; font-weight:800; color:var(--accent); }

#req-feed { max-height:900px; overflow:hidden; }
#req-list { padding:10px 14px 12px; display:flex; flex-direction:column; gap:6px; }

.req-item {
  display:flex; align-items:flex-start; gap:10px; padding:8px 10px; border-radius:10px;
  background:linear-gradient(135deg,rgba(15,15,35,0.8),rgba(10,10,25,0.9));
  border:1px solid rgba(255,255,255,0.06); backdrop-filter:blur(8px);
  animation:reqSlide .45s ease both; transition:all .2s ease; position:relative; overflow:hidden;
}
.req-item::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:linear-gradient(180deg,var(--accent),var(--accent2)); border-radius:10px 0 0 10px; opacity:0.6; }
.req-item:hover { transform:translateX(4px); border-color:rgba(249,115,22,0.2); }
@keyframes reqSlide { from{opacity:0;transform:translateX(30px) scale(0.96)} to{opacity:1;transform:translateX(0) scale(1)} }

.req-icon { font-size:15px; flex-shrink:0; margin-top:2px; filter:drop-shadow(0 0 4px rgba(255,255,255,0.2)); }
.req-body { flex:1; min-width:0; }
.req-user { font-size:11px; font-weight:800; color:#fb923c; margin-bottom:2px; letter-spacing:0.3px; }
.req-text { font-size:11px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:0.9; }
.req-status { font-size:10px; flex-shrink:0; margin-top:2px; font-weight:800; display:flex; align-items:center; gap:4px; }
.req-status.queued    { color:var(--green); text-shadow:0 0 8px rgba(34,197,94,0.4); animation:statusPulse 2s infinite; }
.req-status.searching { color:var(--yellow); animation:statusSpin 1.5s linear infinite; }
.req-status.not_found { color:var(--red); animation:statusShake 0.5s ease-in-out; }
.req-status.error     { color:var(--red); animation:statusFlash 1s infinite; }
.req-status.skip      { color:var(--yellow); }
@keyframes statusPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
@keyframes statusSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
@keyframes statusShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
@keyframes statusFlash { 0%,100%{opacity:1} 50%{opacity:0.5} }

.q-empty { font-size:13px; color:var(--muted); text-align:center; padding:16px 0; font-style:italic; display:flex; align-items:center; justify-content:center; gap:8px; }
.q-empty::before { content:'💬'; opacity:0.5; animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
</style>
</head>
<body>
<div id="req-panel">
  <div class="panel-card">
    <div class="panel-header">💬 Request TikTok</div>
    <div id="req-feed">
      <div id="req-list"><div class="q-empty">Belum ada request</div></div>
    </div>
  </div>
</div>
<script>
const API='http://localhost:8000';
let state={recent_requests:[]};
let cfg={};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function applyConfig(c){
  cfg=c;
  document.documentElement.style.setProperty('--accent',c.accent_color||'#f97316');
  document.documentElement.style.setProperty('--border',hexAlpha(c.accent_color||'#f97316',0.25));
  document.documentElement.style.setProperty('--opacity',c.opacity_panels||0.88);
  const rp=document.getElementById('req-panel');
  toggle('req-panel',c.show_request_feed!==false);
  rp.classList.toggle('pos-left',c.position_queue==='left');
}
function toggle(id,show,cls='hidden'){const el=document.getElementById(id);if(!el)return;show?el.classList.remove(cls):el.classList.add(cls);}
function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

function renderRequests(){
  const list=document.getElementById('req-list');
  const items=state.recent_requests||[];
  const limit=cfg.max_request_items||8;
  if(!items.length){list.innerHTML='<div class="q-empty">Belum ada request</div>';return;}
  list.innerHTML=items.slice(0,limit).map((r,i)=>buildReqItem(r,i)).join('');
}

function addRequest(data){
  state.recent_requests=state.recent_requests||[];
  const ex=state.recent_requests.find(r=>r.user===data.user&&r.text===data.query);
  if(ex){ex.status=data.status;if(data.song_title)ex.song_title=data.song_title;}
  else{state.recent_requests.unshift({type:'request',user:data.user,text:data.query,status:data.status,song_title:data.song_title});state.recent_requests=state.recent_requests.slice(0,20);}
  renderRequests();
}

function buildReqItem(r,idx){
  const isSkip=r.type==='skip';
  const icon=isSkip?'⏭':'🎵';
  const badges={queued:'✅',searching:'🔍',not_found:'❌',error:'⚠️',skip:'🗳️'};
  const sl=isSkip?'skip':(r.status||'queued');
  return`<div class="req-item" style="animation-delay:${idx*0.04}s"><div class="req-icon">${icon}</div><div class="req-body"><div class="req-user">@${esc(r.user||'')}</div><div class="req-text">${esc(r.song_title||r.text||'')}</div></div><div class="req-status ${esc(sl)}">${badges[sl]||''}</div></div>`;
}

function connectSSE(){
  const es=new EventSource(`${API}/overlay/events`);
  es.addEventListener('init',e=>{const d=JSON.parse(e.data);Object.assign(state,d);renderRequests();});
  es.addEventListener('tiktok_request',e=>{addRequest(JSON.parse(e.data));});
  es.addEventListener('overlay_config',e=>{applyConfig(JSON.parse(e.data));});
  es.onerror=()=>{es.close();setTimeout(connectSSE,5000);};
}
async function poll(){try{const r=await fetch(`${API}/overlay/state`);if(r.ok){Object.assign(state,await r.json());renderRequests();}}catch(_){}}
async function init(){try{const r=await fetch(`${API}/overlay/config`);if(r.ok)applyConfig(await r.json());}catch(_){}connectSSE();setInterval(poll,15000);}
init();
</script>
</body>
</html>
