<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OBS – Now Playing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --accent:#f97316; --accent2:#a855f7; --green:#22c55e; --red:#ef4444; --yellow:#facc15;
    --text:#f8fafc; --muted:#94a3b8; --opacity:0.88; --title-size:22px;
    --bg:rgba(6,6,16,var(--opacity));
  }
  html, body {
    width:1920px; height:1080px; overflow:hidden; background:transparent;
    font-family:'Space Grotesk',sans-serif; color:var(--text);
    -webkit-font-smoothing:antialiased;
  }

  /* ── NOW PLAYING BAR ── */
  #now-playing {
    position:fixed; bottom:0; left:0; right:0;
    height:96px;
    background:var(--bg);
    border-top:1px solid rgba(255,255,255,0.07);
    display:flex; align-items:center; gap:20px;
    padding:0 28px;
    backdrop-filter:blur(24px) saturate(180%);
    overflow:hidden;
  }

  /* Top glow line */
  #now-playing::before {
    content:'';
    position:absolute; top:-1px; left:0; right:0; height:2px;
    background:linear-gradient(90deg,
      transparent 0%, var(--accent) 20%,
      var(--accent2) 80%, transparent 100%);
    opacity:0.9;
    animation:shimmer 4s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%,100%{opacity:0.7;} 50%{opacity:1;}
  }

  /* Ambient glow behind bar */
  #now-playing::after {
    content:'';
    position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(ellipse 600px 120px at 30% 50%, rgba(249,115,22,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 600px 120px at 70% 50%, rgba(168,85,247,0.05) 0%, transparent 70%);
  }

  #now-playing.hidden { display:none; }

  /* ── ALBUM ART / DISC ── */
  #np-art-wrap {
    position:relative; width:66px; height:66px; flex-shrink:0;
  }

  #np-disc {
    width:66px; height:66px; border-radius:50%;
    background:conic-gradient(from 0deg, #1a1a2e, #2d1b69, #1a1a2e, #0f0f1e, #1a1a2e);
    border:2px solid rgba(168,85,247,0.5);
    display:flex; align-items:center; justify-content:center;
    font-size:24px; flex-shrink:0;
    animation:spin 5s linear infinite;
    box-shadow:0 0 20px rgba(168,85,247,0.4), inset 0 0 12px rgba(0,0,0,0.5);
  }
  #np-disc.paused { animation-play-state:paused; }
  #np-disc.hidden { display:none !important; }

  /* Center hole */
  #np-disc::after {
    content:''; position:absolute; width:14px; height:14px;
    border-radius:50%; background:#0a0a14;
    box-shadow:0 0 8px rgba(168,85,247,0.6);
  }

  @keyframes spin { to { transform:rotate(360deg); } }

  #np-thumb {
    width:66px; height:66px; border-radius:10px; object-fit:cover;
    background:#1e1e2e; flex-shrink:0;
    border:2px solid rgba(249,115,22,0.3);
    box-shadow:0 0 18px rgba(249,115,22,0.25), 0 4px 12px rgba(0,0,0,0.5);
  }
  #np-thumb.hidden { display:none; }

  /* ── INFO ── */
  #np-info { flex:1; min-width:0; }

  #np-label {
    font-size:9px; text-transform:uppercase; letter-spacing:2.5px;
    color:var(--accent); font-weight:700; margin-bottom:4px;
    font-family:'JetBrains Mono', monospace;
    display:flex; align-items:center; gap:6px;
  }

  #tiktok-dot {
    width:6px; height:6px; border-radius:50%; background:var(--red);
    display:inline-block; transition:background .3s;
  }
  #tiktok-dot.online {
    background:var(--green);
    box-shadow:0 0 6px var(--green);
    animation:pdot 2s infinite;
  }
  #tiktok-dot.off { display:none; }
  @keyframes pdot { 0%,100%{opacity:1} 50%{opacity:.4} }

  #np-title {
    font-size:var(--title-size); font-weight:800; line-height:1.15;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    letter-spacing:-0.3px;
  }
  #np-title.idle { color:var(--muted); font-weight:500; font-size:15px; }

  #np-meta {
    font-size:11px; color:var(--muted); margin-top:4px;
    display:flex; align-items:center; gap:8px;
  }

  #np-channel { font-weight:600; }
  #np-channel.hidden { display:none; }

  #np-requester {
    background:rgba(249,115,22,.12);
    border:1px solid rgba(249,115,22,.25);
    border-radius:20px; padding:1px 9px;
    font-size:10px; color:#fb923c; font-weight:700;
    font-family:'JetBrains Mono', monospace;
  }
  #np-requester.hidden { display:none; }

  /* ── RIGHT SIDE ── */
  #np-right {
    display:flex; flex-direction:column; align-items:flex-end;
    gap:6px; flex-shrink:0;
  }

  #np-queue-badge {
    background:rgba(168,85,247,.12);
    border:1px solid rgba(168,85,247,.3);
    border-radius:20px; padding:4px 14px;
    font-size:11px; color:#c084fc; font-weight:700;
    font-family:'JetBrains Mono', monospace;
  }

  #skip-vote-bar {
    display:flex; align-items:center; gap:6px;
    font-size:11px; color:var(--muted);
    opacity:0; transition:opacity .4s;
  }
  #skip-vote-bar.visible { opacity:1; }
  #skip-vote-bar.hidden { display:none !important; }

  #skip-vote-dots { display:flex; gap:3px; }
  .skip-dot {
    width:7px; height:7px; border-radius:50%;
    background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.15);
    transition:all .2s;
  }
  .skip-dot.filled {
    background:var(--yellow);
    border-color:var(--yellow);
    box-shadow:0 0 5px var(--yellow);
  }

  /* ── TIMER ── */
  #np-timer {
    font-size:10px; color:var(--muted);
    font-family:'JetBrains Mono', monospace;
    font-weight:500; letter-spacing:0.5px;
  }
  #np-timer.hidden { display:none; }

  /* ── PROGRESS BAR ── */
  #np-progress-wrap {
    position:absolute; bottom:0; left:0; right:0; height:3px;
    background:rgba(255,255,255,.05);
  }
  #np-progress-wrap.hidden { display:none; }

  #np-progress-bar {
    height:100%;
    background:linear-gradient(90deg, var(--accent), var(--accent2));
    width:0%; transition:width 1s linear;
    box-shadow:0 0 10px var(--accent), 0 0 20px rgba(249,115,22,.4);
  }

  /* ── EQUALIZER BARS (playing indicator) ── */
  #np-eq {
    display:flex; align-items:flex-end; gap:2px;
    height:20px; width:18px; flex-shrink:0;
  }
  #np-eq.hidden { display:none; }
  #np-eq span {
    display:block; width:3px; background:var(--accent);
    border-radius:2px; animation:eq 0.8s ease-in-out infinite alternate;
  }
  #np-eq span:nth-child(1) { animation-duration:0.6s; animation-delay:0s; }
  #np-eq span:nth-child(2) { animation-duration:0.8s; animation-delay:0.1s; }
  #np-eq span:nth-child(3) { animation-duration:0.5s; animation-delay:0.2s; }
  #np-eq span:nth-child(4) { animation-duration:0.9s; animation-delay:0.05s; }
  #np-eq.paused span { animation-play-state:paused; }
  @keyframes eq {
    from { height: 4px; opacity:0.4; }
    to   { height: 18px; opacity:1; }
  }
</style>
</head>
<body>
<div id="now-playing">
  <div id="np-art-wrap">
    <div id="np-disc">🎵</div>
    <img id="np-thumb" class="hidden" alt="">
  </div>

  <div id="np-eq" class="hidden">
    <span></span><span></span><span></span><span></span>
  </div>

  <div id="np-info">
    <div id="np-label">
      <span id="tiktok-dot"></span>
      ▶ NOW PLAYING
    </div>
    <div id="np-title" class="idle">Menunggu lagu…</div>
    <div id="np-meta">
      <span id="np-channel" class="hidden"></span>
      <span id="np-requester" class="hidden"></span>
    </div>
  </div>

  <div id="np-timer" class="hidden">0:00 / 0:00</div>

  <div id="np-right">
    <div id="np-queue-badge">📋 0 antrian</div>
    <div id="skip-vote-bar">
      <span style="font-size:10px;">⏭ SKIP</span>
      <div id="skip-vote-dots"></div>
      <span id="skip-vote-count" style="font-family:'JetBrains Mono',monospace;font-size:10px;">0/5</span>
    </div>
  </div>

  <div id="np-progress-wrap">
    <div id="np-progress-bar"></div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let state = {
  current_song:null, is_playing:false, is_paused:false,
  queue_count:0, tiktok_connected:false, skip_votes:0,
  skip_threshold:5, elapsed_ms:0
};
let cfg = {};
let songStartedAt=0, songDurationMs=0, progressTimer=null, timerInterval=null;

function applyConfig(c) {
  cfg = c;
  document.documentElement.style.setProperty('--accent', c.accent_color||'#f97316');
  document.documentElement.style.setProperty('--accent2', c.accent_color2||'#a855f7');
  document.documentElement.style.setProperty('--title-size', (c.font_size_title||22)+'px');
  document.documentElement.style.setProperty('--opacity', c.opacity_panels||0.88);
  toggle('now-playing', c.show_now_playing!==false);
  toggle('skip-vote-bar', c.show_skip_vote!==false, 'hidden');
  toggle('np-progress-wrap', c.show_progress_bar!==false);
  const dot = document.getElementById('tiktok-dot');
  if(c.show_tiktok_dot===false) dot.classList.add('off'); else dot.classList.remove('off');
  render();
}

function toggle(id,show,cls='hidden'){
  const el=document.getElementById(id); if(!el)return;
  show ? el.classList.remove(cls) : el.classList.add(cls);
}

function fmt(s){ const m=Math.floor(s/60),sc=Math.floor(s%60); return `${m}:${String(sc).padStart(2,'0')}`; }

function render() {
  const song = state.current_song;
  const title = document.getElementById('np-title');
  const chanEl = document.getElementById('np-channel');
  const reqEl = document.getElementById('np-requester');
  const thumb = document.getElementById('np-thumb');
  const disc = document.getElementById('np-disc');
  const eq = document.getElementById('np-eq');
  const timer = document.getElementById('np-timer');

  document.getElementById('np-queue-badge').textContent = `📋 ${state.queue_count||0} antrian`;

  if(!song || !state.is_playing) {
    title.textContent = 'Menunggu lagu…';
    title.className = 'idle';
    chanEl.textContent=''; chanEl.classList.add('hidden');
    reqEl.classList.add('hidden');
    thumb.classList.add('hidden');
    disc.className=''; disc.style.display='flex';
    eq.classList.add('hidden');
    timer.classList.add('hidden');
    stopProgress(); return;
  }

  title.textContent = song.title;
  title.className = '';

  if(cfg.show_channel!==false && song.channel) {
    chanEl.textContent = song.channel;
    chanEl.classList.remove('hidden');
  } else chanEl.classList.add('hidden');

  if(song.requested_by && cfg.show_requester!==false) {
    reqEl.textContent = '👤 @'+song.requested_by;
    reqEl.classList.remove('hidden');
  } else reqEl.classList.add('hidden');

  if(song.thumbnail && cfg.show_thumbnail!==false) {
    thumb.src=song.thumbnail; thumb.classList.remove('hidden'); disc.style.display='none';
  } else { thumb.classList.add('hidden'); disc.style.display='flex'; }

  disc.className = state.is_paused ? 'paused' : '';
  eq.className = state.is_paused ? 'paused' : '';

  if(song.duration) timer.classList.remove('hidden'); else timer.classList.add('hidden');

  if(state.is_playing && !state.is_paused) {
    songStartedAt = Date.now() - (state.elapsed_ms||0);
    songDurationMs = (song.duration||0) * 1000;
    startProgress();
  } else stopProgress();
}

function startProgress() {
  stopProgress();
  if(!songDurationMs) return;
  const bar = document.getElementById('np-progress-bar');
  const timer = document.getElementById('np-timer');
  const song = state.current_song;
  progressTimer = setInterval(() => {
    const elapsed = Date.now() - songStartedAt;
    const p = Math.min(100, (elapsed/songDurationMs)*100);
    if(cfg.show_progress_bar!==false) bar.style.width = p+'%';
    if(song && song.duration) timer.textContent = `${fmt(elapsed/1000)} / ${fmt(song.duration)}`;
    if(p>=100) stopProgress();
  }, 500);
}

function stopProgress() {
  if(progressTimer){clearInterval(progressTimer);progressTimer=null;}
  document.getElementById('np-progress-bar').style.width = '0%';
}

function updateSkipVote() {
  const bar=document.getElementById('skip-vote-bar');
  const dots=document.getElementById('skip-vote-dots');
  const countEl=document.getElementById('skip-vote-count');
  const v=state.skip_votes||0, t=state.skip_threshold||5;
  countEl.textContent=`${v}/${t}`;
  dots.innerHTML=Array.from({length:t},(_,i)=>`<div class="skip-dot${i<v?' filled':''}"></div>`).join('');
  if(cfg.show_skip_vote!==false) bar.classList.toggle('visible',v>0);
}

function updateDot() {
  const d=document.getElementById('tiktok-dot');
  if(cfg.show_tiktok_dot===false){d.classList.add('off');return;}
  d.classList.remove('off');
  d.classList.toggle('online',!!state.tiktok_connected);
}

function connectSSE() {
  const es = new EventSource(`${API}/overlay/events`);
  es.addEventListener('init',e=>{Object.assign(state,JSON.parse(e.data));render();updateSkipVote();updateDot();});
  es.addEventListener('player_state',e=>{Object.assign(state,JSON.parse(e.data));render();});
  es.addEventListener('skip_vote',e=>{const d=JSON.parse(e.data);state.skip_votes=d.votes;state.skip_threshold=d.threshold;updateSkipVote();});
  es.addEventListener('skip_executed',()=>{state.skip_votes=0;updateSkipVote();});
  es.addEventListener('tiktok_status',e=>{state.tiktok_connected=JSON.parse(e.data).connected;updateDot();});
  es.addEventListener('player_stopped',()=>{state.current_song=null;state.is_playing=false;state.skip_votes=0;render();updateSkipVote();});
  es.addEventListener('overlay_config',e=>{applyConfig(JSON.parse(e.data));});
  es.onerror=()=>{es.close();setTimeout(()=>{poll();setTimeout(connectSSE,5000);},2000);};
}
async function poll(){try{const r=await fetch(`${API}/overlay/state`);if(r.ok){Object.assign(state,await r.json());render();}}catch(_){}}
async function init(){
  try{const r=await fetch(`${API}/overlay/config`);if(r.ok)applyConfig(await r.json());}catch(_){}
  connectSSE();
  setInterval(poll,10000);
}
init();
</script>
</body>
</html>
