<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OBS – Requests</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --accent:#f97316; --accent2:#a855f7;
    --green:#22c55e; --red:#ef4444; --yellow:#facc15;
    --text:#f8fafc; --muted:#64748b; --opacity:0.88; --radius:16px;
    --shadow:0 16px 48px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
  }
  html, body {
    width:1920px; height:1080px; overflow:hidden; background:transparent;
    font-family:'Space Grotesk',sans-serif; color:var(--text);
    -webkit-font-smoothing:antialiased;
  }

  #req-panel {
    position:fixed; top:20px; right:20px; width:310px;
    transition:right .3s, left .3s;
  }
  #req-panel.pos-left { right:auto; left:20px; }
  #req-panel.hidden { display:none; }

  /* ── CARD ── */
  .panel-card {
    background:rgba(6,6,16,var(--opacity));
    border:1px solid rgba(255,255,255,0.07);
    border-radius:var(--radius);
    overflow:hidden;
    backdrop-filter:blur(24px) saturate(180%);
    box-shadow:var(--shadow);
    position:relative;
  }
  .panel-card::before {
    content:'';
    position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent 0%, var(--accent) 40%, var(--accent2) 60%, transparent 100%);
    opacity:0.6;
  }

  /* ── HEADER ── */
  .panel-header {
    display:flex; align-items:center; gap:10px;
    padding:12px 16px 10px;
    font-size:9px; text-transform:uppercase; letter-spacing:2.5px;
    font-weight:700; color:rgba(255,255,255,0.5);
    font-family:'JetBrains Mono',monospace;
    border-bottom:1px solid rgba(255,255,255,.05);
  }
  .header-icon {
    width:22px; height:22px; border-radius:6px;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:11px;
    box-shadow:0 2px 8px rgba(249,115,22,0.4);
  }

  /* ── FEED ── */
  #req-feed { max-height:920px; overflow:hidden; }
  #req-list { padding:8px 10px 10px; display:flex; flex-direction:column; gap:4px; }

  /* ── REQUEST ITEM ── */
  .req-item {
    display:flex; align-items:flex-start; gap:9px;
    padding:8px 10px;
    border-radius:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,.05);
    animation:slideIn .4s cubic-bezier(.34,1.2,.64,1) both;
    position:relative; overflow:hidden;
  }

  /* Accent line left */
  .req-item::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:2px;
    border-radius:2px 0 0 2px;
  }
  .req-item.status-queued::before { background:var(--green); }
  .req-item.status-searching::before { background:var(--yellow); }
  .req-item.status-not_found::before { background:var(--red); }
  .req-item.status-error::before { background:var(--red); }
  .req-item.status-skip::before { background:var(--accent2); }

  @keyframes slideIn {
    from { opacity:0; transform:translateX(16px) scale(0.97); }
    to   { opacity:1; transform:translateX(0) scale(1); }
  }

  /* Highlight new item */
  .req-item.new {
    animation:slideIn .4s cubic-bezier(.34,1.2,.64,1) both,
              newGlow .8s ease-out .4s;
  }
  @keyframes newGlow {
    from { background:rgba(249,115,22,0.12); border-color:rgba(249,115,22,0.3); }
    to   { background:rgba(255,255,255,0.03); border-color:rgba(255,255,255,.05); }
  }

  .req-avatar {
    width:28px; height:28px; border-radius:50%; flex-shrink:0;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:800; color:#fff;
    text-shadow:0 1px 3px rgba(0,0,0,.5);
  }

  .req-body { flex:1; min-width:0; padding-left:4px; }
  .req-user {
    font-size:10px; font-weight:700; color:var(--accent); margin-bottom:2px;
    font-family:'JetBrains Mono',monospace;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .req-text {
    font-size:11px; font-weight:600; color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    line-height:1.3;
  }

  /* ── STATUS BADGE ── */
  .req-status {
    flex-shrink:0; margin-top:2px;
    font-size:9px; font-weight:700;
    padding:2px 7px; border-radius:20px;
    font-family:'JetBrains Mono',monospace;
    letter-spacing:0.5px;
    text-transform:uppercase;
  }
  .req-status.queued    { color:var(--green); background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.2); }
  .req-status.searching { color:var(--yellow); background:rgba(250,204,21,.1); border:1px solid rgba(250,204,21,.2); animation:pulse 1.2s infinite; }
  .req-status.not_found { color:var(--red); background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.2); }
  .req-status.error     { color:var(--red); background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.2); }
  .req-status.skip      { color:#c084fc; background:rgba(168,85,247,.1); border:1px solid rgba(168,85,247,.2); }

  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }

  .q-empty {
    font-size:12px; color:var(--muted); text-align:center;
    padding:16px 0; font-style:italic;
  }
</style>
</head>
<body>
<div id="req-panel">
  <div class="panel-card">
    <div id="req-feed">
      <div class="panel-header">
        <div class="header-icon">💬</div>
        Request TikTok
      </div>
      <div id="req-list"><div class="q-empty">Belum ada request</div></div>
    </div>
  </div>
</div>
<script>
const API='http://localhost:8000';
let state={recent_requests:[]};
let cfg={};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function hexAlpha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}

function applyConfig(c){
  cfg=c;
  document.documentElement.style.setProperty('--accent',c.accent_color||'#f97316');
  document.documentElement.style.setProperty('--opacity',c.opacity_panels||0.88);
  const rp=document.getElementById('req-panel');
  toggle('req-panel',c.show_request_feed!==false);
  rp.classList.toggle('pos-left',c.position_queue==='left');
}
function toggle(id,show,cls='hidden'){const el=document.getElementById(id);if(!el)return;show?el.classList.remove(cls):el.classList.add(cls);}

function getInitials(name){
  return String(name||'?').substring(0,2).toUpperCase();
}

function renderRequests(highlightFirst=false){
  const list=document.getElementById('req-list');
  const items=state.recent_requests||[];
  const limit=cfg.max_request_items||8;
  if(!items.length){list.innerHTML='<div class="q-empty">Belum ada request</div>';return;}
  const labels={queued:'queued',searching:'searching',not_found:'not found',error:'error',skip:'skip'};
  list.innerHTML=items.slice(0,limit).map((r,i)=>{
    const isSkip=r.type==='skip';
    const sl=isSkip?'skip':(r.status||'queued');
    const isNew=(i===0&&highlightFirst)?'new':'';
    const initials=getInitials(r.user);
    const delay=i*35;
    return`<div class="req-item status-${esc(sl)} ${isNew}" style="animation-delay:${delay}ms">
      <div class="req-avatar">${esc(initials)}</div>
      <div class="req-body">
        <div class="req-user">@${esc(r.user||'')}</div>
        <div class="req-text">${esc(r.song_title||r.text||'')}</div>
      </div>
      <div class="req-status ${esc(sl)}">${labels[sl]||sl}</div>
    </div>`;
  }).join('');
}

function addRequest(data){
  state.recent_requests=state.recent_requests||[];
  const ex=state.recent_requests.find(r=>r.user===data.user&&r.text===data.query);
  if(ex){ex.status=data.status;if(data.song_title)ex.song_title=data.song_title;}
  else{state.recent_requests.unshift({type:'request',user:data.user,text:data.query,status:data.status,song_title:data.song_title});state.recent_requests=state.recent_requests.slice(0,20);}
  renderRequests(true);
}

function connectSSE(){
  const es=new EventSource(`${API}/overlay/events`);
  es.addEventListener('init',e=>{const d=JSON.parse(e.data);Object.assign(state,d);renderRequests();});
  es.addEventListener('tiktok_request',e=>{addRequest(JSON.parse(e.data));});
  es.addEventListener('overlay_config',e=>{applyConfig(JSON.parse(e.data));});
  es.onerror=()=>{es.close();setTimeout(connectSSE,5000);};
}
async function poll(){try{const r=await fetch(`${API}/overlay/state`);if(r.ok){Object.assign(state,await r.json());renderRequests();}}catch(_){}}
async function init(){try{const r=await fetch(`${API}/overlay/config`);if(r.ok)applyConfig(await r.json());}catch(_){}connectSSE();setInterval(poll,15000);}
init();
</script>
</body>
</html>
