<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>OBS – Subtitle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --accent:#f97316;
    --accent2:#a855f7;
    --text:#f8fafc;
    --subtitle-size:36px;
    --subtitle-width:1480px;
    --pill-bg:rgba(6,6,16,0.86);
  }
  html, body {
    width:1920px; height:1080px; overflow:hidden; background:transparent;
    font-family:'Space Grotesk',sans-serif; color:var(--text);
    -webkit-font-smoothing:antialiased;
  }

  /* ── WRAPPER ── */
  #subtitle-wrap {
    position:fixed;
    left:50%; bottom:106px;
    transform:translateX(-50%);
    width:min(var(--subtitle-width), 94vw);
    display:flex; flex-direction:column; align-items:center; gap:12px;
    z-index:9999; pointer-events:none;
  }
  #subtitle-wrap.hidden { display:none !important; }

  /* ── PILL ── */
  #sub-pill {
    position:relative;
    width:100%; min-height:72px;
    padding:20px 48px 22px;
    border-radius:36px;
    background:var(--pill-bg);
    border:1px solid rgba(255,255,255,0.07);
    backdrop-filter:blur(24px) saturate(180%);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03) inset,
      0 24px 80px rgba(0,0,0,0.75),
      0 0 160px rgba(249,115,22,0.05);
    overflow:hidden;
  }

  /* Top shimmer line */
  #sub-pill::before {
    content:'';
    position:absolute; left:6%; right:6%; top:0; height:1px;
    background:linear-gradient(90deg,
      transparent 0%,
      rgba(249,115,22,0.9) 20%,
      rgba(168,85,247,0.8) 80%,
      transparent 100%
    );
    opacity:0.8;
  }

  /* Bottom soft glow */
  #sub-pill::after {
    content:'';
    position:absolute; left:15%; right:15%; bottom:-30px;
    height:40px;
    background:radial-gradient(ellipse, rgba(249,115,22,0.15) 0%, transparent 70%);
    filter:blur(12px);
  }

  /* ── TEXT ── */
  #sub-text {
    position:relative; z-index:2;
    width:100%;
    font-size:var(--subtitle-size);
    font-weight:800;
    line-height:1.45;
    letter-spacing:0.2px;
    text-align:center;
    white-space:normal; overflow-wrap:break-word; word-break:break-word;
    text-shadow:0 3px 14px rgba(0,0,0,1), 0 0 28px rgba(0,0,0,0.7);
  }

  /* ── KARAOKE WORDS ── */
  .sw {
    display:inline;
    color:rgba(241,245,249,0.35);
    transition:color .07s ease, text-shadow .07s ease;
  }
  .sw.done {
    color:rgba(241,245,249,0.22);
  }
  .sw.active {
    color:#ffffff;
    text-shadow:
      0 0 18px rgba(249,115,22,1),
      0 0 34px rgba(249,115,22,0.85),
      0 0 60px rgba(249,115,22,0.4),
      0 0 90px rgba(249,115,22,0.15);
    animation:wordPop .13s cubic-bezier(.34,1.6,.64,1) both;
  }

  /* plain subtitle mode */
  #sub-text.plain .sw {
    color:var(--text);
    text-shadow:0 2px 14px rgba(0,0,0,.9);
  }

  @keyframes wordPop {
    from { transform:scale(.83); }
    to   { transform:scale(1); }
  }

  /* ── PROGRESS ── */
  #sub-progress {
    width:min(640px,66%); height:3px;
    border-radius:999px; overflow:hidden;
    background:rgba(255,255,255,0.07);
  }
  #sub-progress.hidden { display:none; }

  #sub-progress-bar {
    width:0%; height:100%;
    background:linear-gradient(90deg, var(--accent), var(--accent2));
    box-shadow:0 0 12px rgba(249,115,22,.9), 0 0 20px rgba(249,115,22,.4);
  }

  /* ── HINT ── */
  #sub-hint {
    font-size:10px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase;
    color:rgba(148,163,184,0.55);
    font-family:'JetBrains Mono',monospace;
    display:none;
  }
  #sub-hint.visible { display:block; }

  /* ── ANIMATIONS ── */
  @keyframes pillIn {
    0%   { opacity:0; transform:translateY(28px) scale(.95); }
    60%  { opacity:1; transform:translateY(-3px) scale(1.015); }
    100% { opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes pillOut {
    from { opacity:1; transform:translateY(0) scale(1); }
    to   { opacity:0; transform:translateY(-20px) scale(.95); }
  }
  @keyframes glowPulse {
    0%,100% {
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 24px 80px rgba(0,0,0,.75),
        0 0 160px rgba(249,115,22,.05);
    }
    50% {
      box-shadow:
        0 0 0 1px rgba(255,255,255,.03) inset,
        0 24px 80px rgba(0,0,0,.75),
        0 0 160px rgba(249,115,22,.22),
        0 0 50px rgba(249,115,22,.14);
    }
  }

  #sub-pill.entering { animation:pillIn .45s cubic-bezier(.34,1.56,.64,1) both; }
  #sub-pill.leaving  { animation:pillOut .25s ease both; }
  #sub-pill.glowing  { animation:glowPulse 2s ease-in-out infinite; }
</style>
</head>
<body>

<div id="subtitle-wrap" class="hidden">
  <div id="sub-pill">
    <div id="sub-text"></div>
  </div>
  <div id="sub-progress" class="hidden">
    <div id="sub-progress-bar"></div>
  </div>
  <div id="sub-hint"></div>
</div>

<script>
const API = 'http://localhost:8000';
let cfg = {};
let visible = false;
let hideTimer = null;
let karaokeTimers = [];

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function applyConfig(c){
  cfg = c || {};
  document.documentElement.style.setProperty('--accent', c.accent_color||'#f97316');
  document.documentElement.style.setProperty('--accent2', c.accent_color2||'#a855f7');
  document.documentElement.style.setProperty('--subtitle-size', (c.subtitle_font_size||36)+'px');
  if(c.show_subtitle===false){ clearSubtitle(true); document.getElementById('subtitle-wrap').classList.add('hidden'); }
}

function showSubtitle(text, words, durationMs, songHint){
  if(cfg.show_subtitle===false) return;
  if(!text||!text.trim()) return;
  clearAllTimers();

  const wrap    = document.getElementById('subtitle-wrap');
  const pill    = document.getElementById('sub-pill');
  const textEl  = document.getElementById('sub-text');
  const hintEl  = document.getElementById('sub-hint');
  const prog    = document.getElementById('sub-progress');
  const progBar = document.getElementById('sub-progress-bar');

  if(songHint){ hintEl.textContent=songHint; hintEl.classList.add('visible'); }
  else hintEl.classList.remove('visible');

  const render = () => {
    if(words && Array.isArray(words) && words.length > 0){
      textEl.className = '';
      textEl.innerHTML = words.map((w,i)=>`<span class="sw" id="sw${i}">${esc(w.word)}</span>`).join(' ');
      pill.classList.add('glowing');

      words.forEach((w,i)=>{
        if(w.start==null) return;
        const t1=setTimeout(()=>{
          const cur=document.getElementById(`sw${i}`);
          if(cur){ cur.classList.remove('done'); cur.classList.add('active'); }
          if(i>0){ const prev=document.getElementById(`sw${i-1}`); if(prev){ prev.classList.remove('active'); prev.classList.add('done'); } }
        }, w.start*1000);
        karaokeTimers.push(t1);
        if(w.end!=null){
          const t2=setTimeout(()=>{ const cur=document.getElementById(`sw${i}`); if(cur){ cur.classList.remove('active'); cur.classList.add('done'); } }, w.end*1000);
          karaokeTimers.push(t2);
        }
      });
    } else {
      textEl.className='plain';
      textEl.innerHTML = text.split(' ').map(w=>`<span class="sw active">${esc(w)}</span>`).join(' ');
      pill.classList.remove('glowing');
    }

    if(durationMs>0){
      prog.classList.remove('hidden');
      progBar.style.transition='none'; progBar.style.width='0%';
      void progBar.offsetWidth;
      progBar.style.transition=`width ${durationMs}ms linear`;
      progBar.style.width='100%';
    } else prog.classList.add('hidden');

    wrap.classList.remove('hidden');
    pill.classList.remove('entering','leaving');
    void pill.offsetWidth;
    pill.classList.add('entering');
    pill.addEventListener('animationend',()=>pill.classList.remove('entering'),{once:true});
    visible=true;
    hideTimer=setTimeout(()=>clearSubtitle(false), durationMs||4500);
  };

  if(visible){
    pill.classList.remove('entering'); pill.classList.add('leaving');
    pill.addEventListener('animationend',()=>{ pill.classList.remove('leaving'); visible=false; render(); },{once:true});
  } else render();
}

function clearAllTimers(){
  if(hideTimer){clearTimeout(hideTimer);hideTimer=null;}
  karaokeTimers.forEach(t=>clearTimeout(t)); karaokeTimers=[];
}

function clearSubtitle(instant){
  clearAllTimers();
  const wrap=document.getElementById('subtitle-wrap');
  const pill=document.getElementById('sub-pill');
  document.getElementById('sub-progress-bar').style.width='0%';
  if(instant||!visible){ wrap.classList.add('hidden'); pill.classList.remove('glowing','entering','leaving'); visible=false; return; }
  pill.classList.remove('entering','glowing'); pill.classList.add('leaving');
  pill.addEventListener('animationend',()=>{ wrap.classList.add('hidden'); pill.classList.remove('leaving'); visible=false; },{once:true});
}

function connectSSE(){
  const es=new EventSource(`${API}/overlay/events`);
  es.addEventListener('subtitle',e=>{ const d=JSON.parse(e.data); showSubtitle(d.text,d.words||null,d.duration_ms||4500,d.song_hint||null); });
  es.addEventListener('subtitle_clear',()=>clearSubtitle(false));
  es.addEventListener('player_stopped',()=>clearSubtitle(false));
  es.addEventListener('overlay_config',e=>applyConfig(JSON.parse(e.data)));
  es.onerror=()=>{es.close();setTimeout(connectSSE,5000);};
}

async function init(){
  try{const r=await fetch(`${API}/overlay/config`);if(r.ok)applyConfig(await r.json());}catch(_){}
  connectSSE();
}
init();
</script>
</body>
</html>
